<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>班级管理系统 - 考试阅卷</title>
    <script src="js/route-fix.js"></script>
    <link rel="stylesheet" href="css/premium-ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
        }

        .sidebar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(99, 102, 241, 0.1);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateX(4px);
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            position: relative;
        }

        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #6366F1, #8B5CF6);
            border-radius: 0 3px 3px 0;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .nav-item {
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            color: #6366F1;
        }

        .dropdown-menu {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .dropdown-item:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .score-input {
            width: 80px;
            text-align: center;
            font-weight: 600;
        }

        .grading-row {
            transition: all 0.2s ease;
        }

        .grading-row:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .progress-bar {
            height: 6px;
            border-radius: 3px;
            background: rgba(71, 85, 105, 0.5);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366F1, #8B5CF6);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .score-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
        }

        .score-excellent { background: rgba(16, 185, 129, 0.2); color: #34D399; }
        .score-good { background: rgba(59, 130, 246, 0.2); color: #60A5FA; }
        .score-pass { background: rgba(245, 158, 11, 0.2); color: #FBBF24; }
        .score-fail { background: rgba(239, 68, 68, 0.2); color: #F87171; }
    </style>
</head>
<body>

            <div class="p-6 border-b border-gray-700/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center shadow-lg">
                        <i class="fa-solid fa-graduation-cap text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white">班级管理系统</h1>
                        <p class="text-xs text-gray-400 hidden sm:block">大学生综合管理平台</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 p-4 space-y-1">
                <a href="dashboard.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-chart-pie text-lg"></i>
                    <span class="font-medium">数据概览</span>

                <a href="attendance-new.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">

                <a href="exam.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">

                </a>

                    <i class="fa-solid fa-check-square-o text-lg"></i>
                    <span class="font-medium">投票抽奖</span>
                </a>
                <a href="chat.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-comments text-lg"></i>
                    <span class="font-medium">实时聊天</span>
                </a>
                <a href="users.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-users text-lg"></i>
                    <span class="font-medium">用户管理</span>
                </a>
                <a href="grading.html" class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-pencil text-lg"></i>
                    <span class="font-medium">考试阅卷</span>
                </a>
                <a href="settings.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-cog text-lg"></i>
                    <span class="font-medium">系统设置</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-700/50">
                <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-colors">
                    <i class="fa-solid fa-right-from-bracket text-lg"></i>
                    <span class="font-medium">退出登录</span>

            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-[#0F172A]/80 backdrop-blur-md border-b border-gray-700/50 sticky top-0 z-30">
                <div class="px-6 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-white">考试阅卷</h2>
                        <p class="text-sm text-gray-400">批改试卷并录入成绩</p>
                    </div>

                    <div class="flex items-center">
                        <div class="relative">
                            <button id="userMenuBtn" class="nav-item flex items-center gap-3 px-3 py-2 rounded-xl text-gray-400 hover:text-white">
                                <div class="w-8 h-8 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-white font-medium">
                                    <i class="fa-solid fa-user"></i>
                                </div>
                                <span class="hidden sm:block font-medium">管理员</span>
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </button>
                            <div id="userDropdown" class="dropdown-menu hidden absolute right-0 top-full mt-2 w-48 rounded-xl p-2 shadow-xl">
                                <a href="profile.html" class="dropdown-item flex items-center gap-2 px-3 py-2 rounded-lg text-gray-300 hover:text-white">
                                    <i class="fa-solid fa-user"></i> 个人资料
                                </a>
                                <a href="settings.html" class="dropdown-item flex items-center gap-2 px-3 py-2 rounded-lg text-gray-300 hover:text-white">
                                    <i class="fa-solid fa-cog"></i> 设置

                                <div class="border-t border-gray-700/50 my-1"></div>
                                <button id="userMenuLogoutBtn" class="dropdown-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-red-400 hover:text-red-300">
                                    <i class="fa-solid fa-right-from-bracket"></i> 退出登录
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <div class="space-y-6">
                    <div class="glass-card rounded-2xl p-6">
                        <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-search text-primary"></i>筛选考试

                        <div class="flex flex-wrap gap-4">
                            <div class="flex-1 min-w-[200px]">
                                <label class="block text-sm font-medium text-gray-400 mb-2">选择考试</label>
                                <select id="examSelect" class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100">

                            </div>
                            <div class="flex-1 min-w-[200px]">

                                <select id="classSelect" class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100">

                            </div>
                            <div class="flex-1 min-w-[200px]">
                                <label class="block text-sm font-medium text-gray-400 mb-2">状态</label>
                                <select id="statusSelect" class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100">
                                    <option value="">全部状态</option>
                                    <option value="pending">待批改</option>
                                    <option value="grading">批改中</option>
                                    <option value="completed">已完成</option>
                                </select>
                            </div>
                            <button onclick="filterResults()" class="btn-primary px-6 py-3 rounded-xl text-white font-medium mt-6">

                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="glass-card rounded-2xl p-6 text-center">
                            <div class="w-12 h-12 mx-auto mb-4 rounded-xl bg-blue-500/20 flex items-center justify-center">
                                <i class="fa-solid fa-file-text text-blue-400 text-xl"></i>
                            </div>
                            <div class="text-3xl font-bold text-white mb-1" id="totalExams">0</div>
                            <div class="text-sm text-gray-400">待批改试卷</div>
                        </div>
                        <div class="glass-card rounded-2xl p-6 text-center">
                            <div class="w-12 h-12 mx-auto mb-4 rounded-xl bg-yellow-500/20 flex items-center justify-center">
                                <i class="fa-solid fa-pencil text-yellow-400 text-xl"></i>
                            </div>
                            <div class="text-3xl font-bold text-white mb-1" id="gradingCount">0</div>
                            <div class="text-sm text-gray-400">批改中</div>
                        </div>
                        <div class="glass-card rounded-2xl p-6 text-center">
                            <div class="w-12 h-12 mx-auto mb-4 rounded-xl bg-green-500/20 flex items-center justify-center">

                            <div class="w-12 h-12 mx-auto mb-4 rounded-xl bg-purple-500/20 flex items-center justify-center">
                                <i class="fa-solid fa-chart-line text-purple-400 text-xl"></i>
                            </div>
                            <div class="text-3xl font-bold text-white mb-1" id="avgScore">0</div>
                            <div class="text-sm text-gray-400">平均分</div>
                        </div>
                    </div>

                    <div class="glass-card rounded-2xl overflow-hidden">
                        <div class="p-6 border-b border-gray-700/50">
                            <h3 class="text-lg font-bold text-white flex items-center gap-2">
                                <i class="fa-solid fa-table text-primary"></i>阅卷列表
                            </h3>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="border-b border-gray-700/50">
                                        <th class="px-6 py-4 text-left text-sm font-medium text-gray-400">学生信息</th>
                                        <th class="px-6 py-4 text-left text-sm font-medium text-gray-400">考试名称</th>
                                        <th class="px-6 py-4 text-left text-sm font-medium text-gray-400">提交时间</th>
                                        <th class="px-6 py-4 text-left text-sm font-medium text-gray-400">得分</th>
                                        <th class="px-6 py-4 text-left text-sm font-medium text-gray-400">状态</th>
                                        <th class="px-6 py-4 text-left text-sm font-medium text-gray-400">操作</th>
                                    </tr>
                                </thead>

                                    <tr>
                                        <td colspan="6" class="px-6 py-12 text-center text-gray-400">
                                            <i class="fa-solid fa-file-text text-4xl mb-4"></i>

    <div id="gradingModal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">

            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">
                    <i class="fa-solid fa-pencil text-primary mr-2"></i>批改试卷
                </h3>
                <button onclick="closeGradingModal()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div id="gradingContent">
            </div>
        </div>

    <div id="toastContainer" class="fixed top-6 right-6 z-50 space-y-3"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-service.js"></script>
    <script src="js/leancloud-config.js"></script>
    <script src="js/leancloud-service.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>
    <script src="js/data.js?v=8"></script>
    <script src="js/data-service.js"></script>

    <script>
        let currentUser = null;
        let currentExamRecords = [];
        let gradingRecord = null;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgClass = {
                success: 'toast-success',
                error: 'toast-error',
                warning: 'toast-warning',
                info: 'toast-info'
            }[type] || 'toast-info';

            const icon = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            }[type] || 'fa-info-circle';

            toast.className = `animate-slide-in-right ${bgClass} text-white px-6 py-4 rounded-xl shadow-lg flex items-center space-x-3 min-w-[280px]`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-lg"></i>
                <span class="font-medium">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await init();
        });

        async function init() {
            try {
                currentUser = await DataService.getCurrentUser();
                if (!currentUser) {
                    window.location.href = 'index.html';
                    return;
                }

                if (currentUser.role !== 'admin' && currentUser.role !== 'subAdmin') {
                    window.location.href = 'dashboard.html';
                    return;
                }

                await loadExams();
                await loadGradingRecords();
                initEventListeners();
            } catch (error) {
                console.error('Init error:', error);
            }
        }

        async function loadExams() {
            try {
                const exams = await DataService.getExams() || [];
                const select = document.getElementById('examSelect');
                
                exams.forEach(exam => {
                    const option = document.createElement('option');
                    option.value = exam.id;
                    option.textContent = exam.title;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Load exams error:', error);
            }
        }

        async function loadGradingRecords() {
            try {
                const records = await DataService.getExamRecords() || [];
                currentExamRecords = records;
                renderTable(records);
                updateStats(records);
            } catch (error) {
                console.error('Load grading records error:', error);
            }
        }

        function updateStats(records) {
            const pending = records.filter(r => !r.score).length;
            const grading = records.filter(r => r.score && !r.graded).length;
            const completed = records.filter(r => r.graded).length;
            
            const scoredRecords = records.filter(r => r.score && r.score > 0);
            const avgScore = scoredRecords.length > 0 
                ? Math.round(scoredRecords.reduce((sum, r) => sum + r.score, 0) / scoredRecords.length)
                : 0;

            document.getElementById('totalExams').textContent = pending;
            document.getElementById('gradingCount').textContent = grading;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('avgScore').textContent = avgScore;
        }

        function renderTable(records) {
            const tbody = document.getElementById('gradingTableBody');
            
            if (records.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center text-gray-400">
                            <i class="fa-solid fa-file-text text-4xl mb-4"></i>
                            <p>暂无阅卷记录</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = records.map(record => {
                const score = record.score || '-';
                const statusText = record.graded ? '已完成' : (record.score ? '批改中' : '待批改');
                const statusClass = record.graded ? 'status-success' : (record.score ? 'status-warning' : 'status-pending');
                const scoreClass = record.score >= 90 ? 'score-excellent' : 
                                  record.score >= 70 ? 'score-good' : 
                                  record.score >= 60 ? 'score-pass' : 'score-fail';

                return `
                    <tr class="grading-row border-b border-gray-700/30 hover:bg-gray-800/30">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-medium">
                                    ${record.user_name ? record.user_name.substring(0, 1).toUpperCase() : 'U'}
                                </div>
                                <div>
                                    <div class="text-sm font-medium text-white">${record.user_name || '-'}</div>
                                    <div class="text-xs text-gray-400">${record.student_id || '-'}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-300">${record.exam_title || '-'}</td>
                        <td class="px-6 py-4 text-sm text-gray-400">${record.created_at ? new Date(record.created_at).toLocaleString() : '-'}</td>
                        <td class="px-6 py-4">
                            <span class="score-badge ${record.score ? scoreClass : ''}">${score}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </td>
                        <td class="px-6 py-4">
                            <button onclick="openGradingModal('${record.id}')" class="btn-primary px-4 py-2 rounded-lg text-white text-sm font-medium">
                                <i class="fa-solid fa-pencil mr-1"></i>批改
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterResults() {
            const examId = document.getElementById('examSelect').value;
            const className = document.getElementById('classSelect').value;
            const status = document.getElementById('statusSelect').value;

            let filtered = currentExamRecords;

            if (examId) {
                filtered = filtered.filter(r => r.exam_id === examId);
            }
            if (className) {
                filtered = filtered.filter(r => r.class_name === className);
            }
            if (status) {
                if (status === 'pending') filtered = filtered.filter(r => !r.score);
                if (status === 'grading') filtered = filtered.filter(r => r.score && !r.graded);
                if (status === 'completed') filtered = filtered.filter(r => r.graded);
            }

            renderTable(filtered);
            updateStats(filtered);
        }

        async function openGradingModal(recordId) {
            try {
                const record = currentExamRecords.find(r => r.id === recordId);
                if (!record) return;

                gradingRecord = record;
                
                const exam = await DataService.getExamById(record.exam_id);
                if (!exam) {
                    showToast('无法找到考试信息', 'error');
                    return;
                }

                let questions = [];
                if (exam.questions) {
                    questions = typeof exam.questions === 'string' ? JSON.parse(exam.questions) : exam.questions;
                }

                let content = `
                    <div class="mb-6 p-4 bg-gray-800/50 rounded-xl">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold text-white">${exam.title}</h4>
                                <p class="text-sm text-gray-400 mt-1">满分: ${exam.total_score}分</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm text-gray-400">学生</p>
                                <p class="font-medium text-white">${record.user_name || '-'}</p>
                            </div>
                        </div>
                    </div>
                `;

                questions.forEach((question, index) => {
                    const userAnswer = record.answers ? (typeof record.answers === 'string' ? JSON.parse(record.answers) : record.answers)[index] : '';
                    content += `
                        <div class="mb-6 p-4 bg-gray-800/50 rounded-xl">
                            <div class="flex items-center gap-3 mb-3">
                                <span class="w-8 h-8 rounded-lg bg-primary/20 text-primary flex items-center justify-center font-bold">${index + 1}</span>
                                <span class="text-sm font-medium text-gray-400">${question.type === 'single' ? '单选题' : question.type === 'multiple' ? '多选题' : '判断题'}</span>
                                <span class="text-sm text-gray-500">(${question.score}分)</span>
                            </div>
                            <p class="text-white mb-4">${question.question}</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                                ${question.options.map((opt, optIndex) => {
                                    const isSelected = Array.isArray(userAnswer) 
                                        ? userAnswer.includes(String.fromCharCode(65 + optIndex))
                                        : userAnswer === String.fromCharCode(65 + optIndex);
                                    const isCorrect = Array.isArray(question.answer)
                                        ? question.answer.includes(String.fromCharCode(65 + optIndex))
                                        : question.answer === String.fromCharCode(65 + optIndex);
                                    
                                    let bgClass = 'bg-gray-700/50';
                                    if (isCorrect) bgClass = 'bg-green-500/20 border-green-500/50';
                                    else if (isSelected && !isCorrect) bgClass = 'bg-red-500/20 border-red-500/50';

                                    return `
                                        <div class="p-3 rounded-lg ${bgClass} border flex items-center gap-3">
                                            <span class="font-medium ${isCorrect ? 'text-green-400' : isSelected ? 'text-red-400' : 'text-gray-400'}">${String.fromCharCode(65 + optIndex)}</span>
                                            <span class="${isCorrect ? 'text-green-400' : isSelected ? 'text-red-400' : 'text-gray-300'}">${opt}</span>
                                            ${isCorrect ? '<i class="fa-solid fa-check text-green-400 ml-auto"></i>' : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                            <div class="flex items-center justify-between">
                                <div>
                                    <span class="text-sm text-gray-400">学生答案: </span>
                                    <span class="text-white font-medium">${userAnswer || '未作答'}</span>
                                </div>
                                <div>
                                    <span class="text-sm text-gray-400">正确答案: </span>
                                    <span class="text-green-400 font-medium">${question.answer}</span>
                                </div>
                            </div>
                            <div class="mt-4 flex items-center gap-3">
                                <span class="text-sm text-gray-400">得分:</span>
                                <input type="number" id="score-${index}" 
                                    class="input-field score-input px-3 py-2 rounded-lg outline-none text-white"
                                    min="0" max="${question.score}"
                                    value="${record.scores && record.scores[index] !== undefined ? record.scores[index] : ''}">
                                <span class="text-gray-400">/ ${question.score}分</span>
                            </div>
                        </div>
                    `;
                });

                content += `
                    <div class="mt-6 flex items-center justify-between">
                        <div>
                            <span class="text-gray-400">总得分:</span>
                            <span class="text-2xl font-bold text-white ml-2" id="totalScoreDisplay">0</span>
                            <span class="text-gray-400"> / ${exam.total_score}</span>
                        </div>
                        <button onclick="saveGrading()" class="btn-primary px-6 py-3 rounded-xl text-white font-medium">
                            <i class="fa-solid fa-save mr-2"></i>保存评分
                        </button>
                    </div>
                `;

                document.getElementById('gradingContent').innerHTML = content;
                document.getElementById('gradingModal').classList.remove('hidden');
                
                updateTotalScore();
                document.querySelectorAll('[id^="score-"]').forEach(input => {
                    input.addEventListener('input', updateTotalScore);
                });
            } catch (error) {
                console.error('Open grading modal error:', error);
                showToast('打开批改页面失败', 'error');
            }
        }

        function updateTotalScore() {
            let total = 0;
            document.querySelectorAll('[id^="score-"]').forEach(input => {
                total += parseInt(input.value) || 0;
            });
            document.getElementById('totalScoreDisplay').textContent = total;
        }

        function closeGradingModal() {
            document.getElementById('gradingModal').classList.add('hidden');
            gradingRecord = null;
        }

        async function saveGrading() {
            if (!gradingRecord) return;

            const scores = [];
            document.querySelectorAll('[id^="score-"]').forEach((input, index) => {
                scores[index] = parseInt(input.value) || 0;
            });

            const totalScore = scores.reduce((sum, s) => sum + s, 0);

            try {
                await DataService.updateExamRecord(gradingRecord.id, {
                    score: totalScore,
                    scores: scores,
                    graded: true,
                    graded_at: new Date().toISOString()
                });

                showToast('评分保存成功', 'success');
                closeGradingModal();
                await loadGradingRecords();
            } catch (error) {
                console.error('Save grading error:', error);
                showToast('保存评分失败', 'error');
            }
        }

        function initEventListeners() {
            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                showConfirm('退出登录', '确定要退出登录吗？', 'warning', async () => {
                    await DataService.signOut();
                    window.location.href = 'index.html';
                });
            });

            document.getElementById('userMenuLogoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                showConfirm('退出登录', '确定要退出登录吗？', 'warning', async () => {
                    await DataService.signOut();
                    window.location.href = 'index.html';
                });
            });

            document.getElementById('userMenuBtn').addEventListener('click', () => {
                document.getElementById('userDropdown').classList.toggle('hidden');
            });
        }

        function showConfirm(title, message, type, callback) {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 modal-overlay flex items-center justify-center z-50';
            overlay.innerHTML = `
                <div class="glass-card rounded-2xl p-8 max-w-sm w-full mx-4 text-center">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-full ${type === 'danger' ? 'bg-red-500/20' : type === 'warning' ? 'bg-orange-500/20' : 'bg-blue-500/20'} flex items-center justify-center">
                        <i class="fa-solid ${type === 'danger' ? 'fa-exclamation-triangle text-red-400' : type === 'warning' ? 'fa-exclamation-circle text-orange-400' : 'fa-info-circle text-blue-400'} text-3xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2">${title}</h3>
                    <p class="text-gray-400 mb-6">${message}</p>
                    <div class="flex items-center space-x-3">
                        <button class="cancel-btn flex-1 px-4 py-3 bg-gray-700/50 text-gray-300 rounded-xl font-medium hover:bg-gray-700 transition-colors">取消</button>
                        <button class="ok-btn flex-1 px-4 py-3 ${type === 'danger' ? 'bg-red-500 hover:bg-red-600' : type === 'warning' ? 'bg-orange-500 hover:bg-orange-600' : 'bg-blue-500 hover:bg-blue-600'} text-white rounded-xl font-medium transition-colors">确定</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            overlay.querySelector('.cancel-btn').addEventListener('click', () => overlay.remove());
            overlay.querySelector('.ok-btn').addEventListener('click', async () => {
                await callback();
                overlay.remove();
            });
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.remove();
            });
        }
    </script>
</body>
</html>
