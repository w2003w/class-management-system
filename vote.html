<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>班级管理系统 - 投票抽奖</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F172A">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/premium-ui.css">
    <style>
        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
        }

        .sidebar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(99, 102, 241, 0.1);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateX(4px);
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            position: relative;
        }

        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #6366F1, #8B5CF6);
            border-radius: 0 3px 3px 0;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: medium;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }

        .status-ended {
            background: rgba(107, 114, 128, 0.2);
            color: #9CA3AF;
        }

        .nav-item {
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            color: #6366F1;
        }

        .dropdown-menu {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .dropdown-item:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .vote-btn {
            background: linear-gradient(135deg, #10B981, #059669);
            transition: all 0.3s ease;
        }

        .vote-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .lottery-btn {
            background: linear-gradient(135deg, #F59E0B, #D97706);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        .lottery-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(245, 158, 11, 0.4);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
        }

        .option-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .option-card:hover {
            border-color: #6366F1;
            transform: translateX(4px);
        }

        .option-card.selected {
            border-color: #10B981;
            background: rgba(16, 185, 129, 0.1);
        }

        .progress-bar {
            background: rgba(71, 85, 105, 0.3);
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress-fill {
            border-radius: 9999px;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar fixed lg:sticky top-0 left-0 h-full w-64 flex flex-col z-40">
            <div class="p-6 border-b border-gray-700/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center shadow-lg">
                        <i class="fa-solid fa-graduation-cap text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white">班级管理系统</h1>
                        <p class="text-xs text-gray-400 hidden sm:block">大学生综合管理平台</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 p-4 space-y-1">
                <a href="dashboard.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-chart-pie text-lg"></i>
                    <span class="font-medium">数据概览</span>
                </a>
                <a href="attendance-new.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-map-marker text-lg"></i>
                    <span class="font-medium">签到管理</span>
                </a>
                <a href="exam.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-file-text text-lg"></i>
                    <span class="font-medium">考试系统</span>
                </a>
                <a href="vote.html" class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-check-square-o text-lg"></i>
                    <span class="font-medium">投票抽奖</span>
                </a>
                <a href="chat.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-comments text-lg"></i>
                    <span class="font-medium">实时聊天</span>
                </a>
                <a href="users.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-users text-lg"></i>
                    <span class="font-medium">成员管理</span>
                </a>
                <a href="settings.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-cog text-lg"></i>
                    <span class="font-medium">系统设置</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-700/50">
                <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-colors">
                    <i class="fa-solid fa-right-from-bracket text-lg"></i>
                    <span class="font-medium">退出登录</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-[#0F172A]/80 backdrop-blur-md border-b border-gray-700/50 sticky top-0 z-30">
                <div class="px-6 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-white">投票抽奖</h2>
                        <p class="text-sm text-gray-400">创建和参与投票与抽奖活动</p>
                    </div>

                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2">
                            <button id="tabVote" class="px-4 py-2 bg-primary/20 text-primary rounded-lg font-medium flex items-center gap-2">
                                <i class="fa-solid fa-check-circle"></i> 投票
                            </button>
                            <button id="tabLottery" class="px-4 py-2 text-gray-400 hover:text-white rounded-lg font-medium flex items-center gap-2">
                                <i class="fa-solid fa-gift"></i> 抽奖
                            </button>
                        </div>

                        <button id="createActivityBtn" class="btn-primary px-5 py-2.5 rounded-xl text-white font-medium flex items-center gap-2">
                            <i class="fa-solid fa-plus"></i> 创建活动
                        </button>

                        <div class="relative">
                            <button id="userMenuBtn" class="nav-item flex items-center gap-3 px-3 py-2 rounded-xl text-gray-400 hover:text-white">
                                <div class="w-8 h-8 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-white font-medium">
                                    <i class="fa-solid fa-user"></i>
                                </div>
                                <span class="hidden sm:block font-medium">管理员</span>
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </button>
                            <div id="userDropdown" class="dropdown-menu hidden absolute right-0 top-full mt-2 w-48 rounded-xl p-2 shadow-xl">
                                <a href="profile.html" class="dropdown-item flex items-center gap-2 px-3 py-2 rounded-lg text-gray-300 hover:text-white">
                                    <i class="fa-solid fa-user"></i> 个人资料
                                </a>
                                <a href="settings.html" class="dropdown-item flex items-center gap-2 px-3 py-2 rounded-lg text-gray-300 hover:text-white">
                                    <i class="fa-solid fa-cog"></i> 设置
                                </a>
                                <div class="border-t border-gray-700/50 my-1"></div>
                                <button id="userMenuLogoutBtn" class="dropdown-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-red-400 hover:text-red-300">
                                    <i class="fa-solid fa-right-from-bracket"></i> 退出登录
                                </button>

            <div class="p-6">
                <div id="voteSection">
                    <div id="voteList" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    </div>
                </div>

                <div id="lotterySection" class="hidden">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2">
                            <div id="lotteryList" class="space-y-4">
                            </div>
                        </div>

                        <div class="lg:col-span-1">
                            <div class="glass-card rounded-2xl p-6 sticky top-24">
                                <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                    <i class="fa-solid fa-trophy text-yellow-400"></i> 幸运抽奖
                                </h3>
                                <div class="text-center">
                                    <div class="w-24 h-24 bg-gradient-to-br from-yellow-500 to-orange-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                                        <i class="fa-solid fa-gift text-white text-3xl"></i>
                                    </div>
                                    <p class="text-gray-400 mb-6">点击下方按钮参与抽奖</p>
                                    <button id="startLotteryBtn" class="lottery-btn w-full py-4 rounded-xl text-white font-bold text-lg flex items-center justify-center gap-2">
                                        <i class="fa-solid fa-shuffle"></i> 开始抽奖
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="createActivityModal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="glass-card rounded-2xl p-6 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">
                    <i class="fa-solid fa-plus-circle text-primary mr-2"></i>创建活动
                </h3>
                <button id="closeCreateModal" class="text-gray-400 hover:text-gray-200 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <form id="createActivityForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">活动名称</label>
                    <input type="text" id="activityName" 
                        class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100"
                        placeholder="例如: 班委选举" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">活动类型</label>
                    <select id="activityType" class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100">
                        <option value="vote">投票</option>
                        <option value="lottery">抽奖</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">活动选项</label>
                    <div id="optionList" class="space-y-2">
                        <div class="flex items-center gap-2">
                            <input type="text" class="input-field flex-1 px-4 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                placeholder="选项 1" required>
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="text" class="input-field flex-1 px-4 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                placeholder="选项 2" required>
                        </div>
                    </div>
                    <button type="button" id="addOptionBtn" class="mt-2 w-full py-2 border border-dashed border-gray-600 rounded-xl text-gray-400 hover:text-primary hover:border-primary transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus"></i> 添加选项
                    </button>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">活动说明</label>
                    <textarea id="activityDescription" rows="3"
                        class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100 resize-none"
                        placeholder="添加活动说明..."></textarea>
                </div>

                <div class="flex items-center justify-between">
                    <button type="button" id="cancelCreateBtn" 
                        class="flex-1 py-3 bg-[#334155] text-gray-300 rounded-xl font-medium hover:bg-[#475569] transition-colors">
                        取消
                    </button>
                    <button type="submit" 
                        class="flex-1 py-3 bg-gradient-to-r from-primary to-secondary text-white rounded-xl font-medium hover:opacity-90 transition-opacity ml-3">

                    </button>
                </div>

    <div id="voteModal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="glass-card rounded-2xl p-6 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white" id="voteTitle">投票</h3>
                <button id="closeVoteModal" class="text-gray-400 hover:text-gray-200 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div id="voteOptions" class="space-y-3">
            </div>

            <button id="submitVoteBtn" class="mt-6 w-full py-4 vote-btn rounded-xl text-white font-semibold text-lg">
                提交投票
            </button>
        </div>
    </div>

    <div id="lotteryResultModal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="glass-card rounded-2xl p-8 max-w-sm w-full mx-4 text-center">
            <div class="w-24 h-24 bg-gradient-to-br from-yellow-500 to-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg animate-bounce">
                <i class="fa-solid fa-trophy text-white text-4xl"></i>
            </div>
            <h3 class="text-2xl font-bold text-white mb-2">恭喜中奖！</h3>
            <p class="text-gray-400 mb-2">您获得了</p>
            <p class="text-3xl font-bold text-yellow-400 mb-6" id="lotteryPrize">一等奖</p>
            <button id="closeLotteryResultBtn" class="w-full py-3 bg-gradient-to-r from-primary to-secondary text-white rounded-xl font-medium">
                确定
            </button>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-6 right-6 z-50 space-y-3"></div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }
    </script>
    <script src="https://unpkg.com/@supabase/supabase-js@2?v=3"></script>
    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/supabase-service.js?v=3"></script>
    <script src="js/leancloud-config.js?v=3"></script>
    <script src="js/leancloud-service.js?v=3"></script>
    <script src="js/firebase-config.js?v=3"></script>
    <script src="js/firebase-service.js?v=3"></script>
    <script src="js/data.js?v=3"></script>
    <script src="js/data-service.js?v=3"></script>
    <script>
        let currentActivityId = null;
        let currentTab = 'vote';

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgClass = {
                success: 'toast-success',
                error: 'toast-error',
                warning: 'toast-warning',
                info: 'toast-info'
            }[type] || 'toast-info';

            const icon = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            }[type] || 'fa-info-circle';

            toast.className = `animate-slide-in-right ${bgClass} text-white px-6 py-4 rounded-xl shadow-lg flex items-center space-x-3 min-w-[280px]`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-lg"></i>
                <span class="font-medium">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function checkLogin() {
            await DataService.init();
            const user = await DataService.getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return null;
            }
            return user;
        }

        async function logout() {
            await DataService.signOut();
            window.location.href = 'index.html';
        }

        async function loadActivities() {
            try {
                const activities = await DataService.getActivities();
                const voteActivities = activities.filter(a => a.type === 'vote');
                const lotteryActivities = activities.filter(a => a.type === 'lottery');

                renderVoteList(voteActivities);
                renderLotteryList(lotteryActivities);

            } catch (error) {
                console.error('加载活动数据失败:', error);
            }
        }

        function renderVoteList(activities) {
            const container = document.getElementById('voteList');

            if (activities.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="w-16 h-16 bg-gray-800/50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-check-square text-gray-500 text-2xl"></i>
                        </div>
                        <p class="text-gray-400">暂无投票活动</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = activities.map(activity => {
                const totalVotes = activity.votes ? Object.values(activity.votes).reduce((a, b) => a + b, 0) : 0;
                
                let options = activity.options;
                if (typeof options === 'string') {
                    try {
                        options = JSON.parse(options);
                    } catch (e) {
                        options = [];
                    }
                }
                if (!Array.isArray(options)) {
                    options = [];
                }

                return `
                    <div class="glass-card rounded-xl p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <h4 class="text-lg font-bold text-white">${activity.name}</h4>
                                <p class="text-sm text-gray-400 mt-1">${activity.description || '暂无说明'}</p>
                            </div>
                            <span class="status-badge status-active">进行中</span>
                        </div>

                        <div class="space-y-3 mb-6">
                            ${options.slice(0, 3).map((opt, idx) => {
                                const votes = activity.votes?.[idx] || 0;
                                const rate = totalVotes > 0 ? Math.round((votes / totalVotes) * 100) : 0;
                                return `
                                    <div class="p-3 bg-gray-800/30 rounded-lg">
                                        <div class="flex items-center justify-between mb-2">
                                            <span class="text-sm text-gray-300">${opt}</span>
                                            <span class="text-sm text-primary font-medium">${votes}票 (${rate}%)</span>
                                        </div>
                                        <div class="progress-bar h-2">
                                            <div class="progress-fill h-full bg-gradient-to-r from-primary to-secondary" style="width: ${rate}%"></div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>

                        <button class="vote-btn w-full py-3 rounded-xl text-white font-medium flex items-center justify-center gap-2"
                            onclick="openVoteModal('${activity.id}')">
                            <i class="fa-solid fa-check-circle"></i> 参与投票
                        </button>
                    </div>
                `;
            }).join('');
        }

        function renderLotteryList(activities) {
            const container = document.getElementById('lotteryList');

            if (activities.length === 0) {
                container.innerHTML = `
                    <div class="glass-card rounded-2xl p-12 text-center">
                        <div class="w-16 h-16 bg-gray-800/50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-gift text-gray-500 text-2xl"></i>
                        </div>
                        <p class="text-gray-400">暂无抽奖活动</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = activities.map(activity => `
                <div class="glass-card rounded-xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <h4 class="text-lg font-bold text-white">${activity.name}</h4>
                            <p class="text-sm text-gray-400 mt-1">${activity.description || '暂无说明'}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-sm text-gray-500">奖品: ${activity.options?.join(', ')}</span>
                            <button class="lottery-btn px-5 py-2.5 rounded-xl text-white font-medium flex items-center gap-2">
                                <i class="fa-solid fa-shuffle"></i> 抽奖
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openVoteModal(activityId) {
            try {
                const activity = await DataService.getActivityById(activityId);
                if (!activity) {
                    showToast('活动不存在', 'error');
                    return;
                }

                currentActivityId = activityId;
                document.getElementById('voteTitle').textContent = activity.name;

                document.getElementById('voteOptions').innerHTML = activity.options?.map((opt, idx) => `
                    <label class="option-card flex items-center p-4 rounded-xl border border-gray-700/50 cursor-pointer">
                        <input type="radio" name="vote-option" value="${idx}" class="w-5 h-5 text-primary">
                        <span class="ml-3 text-white font-medium">${opt}</span>
                    </label>
                `).join('');

                document.getElementById('voteModal').classList.remove('hidden');

            } catch (error) {
                showToast('加载活动失败', 'error');
            }
        }

        async function submitVote() {
            if (!currentActivityId) return;

            const selectedOption = document.querySelector('input[name="vote-option"]:checked');
            if (!selectedOption) {
                showToast('请选择一个选项', 'warning');
                return;
            }

            try {
                const result = await DataService.vote(currentActivityId, parseInt(selectedOption.value));
                
                if (result.success) {
                    showToast('投票成功！', 'success');
                    document.getElementById('voteModal').classList.add('hidden');
                    loadActivities();
                } else {
                    showToast(result.message || '投票失败', 'error');
                }
            } catch (error) {
                showToast('投票失败: ' + error.message, 'error');
            }
        }

        function startLottery() {
            const prizes = ['一等奖', '二等奖', '三等奖', '参与奖', '谢谢参与'];
            const prize = prizes[Math.floor(Math.random() * prizes.length)];

            document.getElementById('lotteryPrize').textContent = prize;
            document.getElementById('lotteryResultModal').classList.remove('hidden');
        }

        async function init() {
            await checkLogin();
            await loadActivities();

            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('userMenuLogoutBtn').addEventListener('click', logout);

            document.getElementById('userMenuBtn').addEventListener('click', () => {
                document.getElementById('userDropdown').classList.toggle('hidden');
            });

            document.getElementById('tabVote').addEventListener('click', () => {
                currentTab = 'vote';
                document.getElementById('tabVote').className = 'px-4 py-2 bg-primary/20 text-primary rounded-lg font-medium';
                document.getElementById('tabLottery').className = 'px-4 py-2 text-gray-400 hover:text-white rounded-lg font-medium';
                document.getElementById('voteSection').classList.remove('hidden');
                document.getElementById('lotterySection').classList.add('hidden');
            });

            document.getElementById('tabLottery').addEventListener('click', () => {
                currentTab = 'lottery';
                document.getElementById('tabLottery').className = 'px-4 py-2 bg-primary/20 text-primary rounded-lg font-medium';
                document.getElementById('tabVote').className = 'px-4 py-2 text-gray-400 hover:text-white rounded-lg font-medium';
                document.getElementById('lotterySection').classList.remove('hidden');
                document.getElementById('voteSection').classList.add('hidden');
            });

            document.getElementById('createActivityBtn').addEventListener('click', () => {
                document.getElementById('createActivityModal').classList.remove('hidden');
            });

            document.getElementById('closeCreateModal').addEventListener('click', () => {
                document.getElementById('createActivityModal').classList.add('hidden');
            });

            document.getElementById('cancelCreateBtn').addEventListener('click', () => {
                document.getElementById('createActivityModal').classList.add('hidden');
            });

            document.getElementById('closeVoteModal').addEventListener('click', () => {
                document.getElementById('voteModal').classList.add('hidden');
            });

            document.getElementById('closeLotteryResultBtn').addEventListener('click', () => {
                document.getElementById('lotteryResultModal').classList.add('hidden');
            });

            document.getElementById('submitVoteBtn').addEventListener('click', submitVote);
            document.getElementById('startLotteryBtn').addEventListener('click', startLottery);

            document.getElementById('addOptionBtn').addEventListener('click', () => {
                const optionList = document.getElementById('optionList');
                const count = optionList.children.length + 1;
                
                const newOption = document.createElement('div');
                newOption.className = 'flex items-center gap-2';
                newOption.innerHTML = `
                    <input type="text" class="input-field flex-1 px-4 py-2 rounded-lg outline-none text-gray-100 text-sm"
                        placeholder="选项 ${count}" required>
                    <button type="button" class="text-gray-400 hover:text-red-400 remove-option-btn">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `;
                
                optionList.appendChild(newOption);

                newOption.querySelector('.remove-option-btn').addEventListener('click', () => {
                    newOption.remove();
                });
            });

            document.getElementById('createActivityForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const name = document.getElementById('activityName').value.trim();
                const type = document.getElementById('activityType').value;
                const description = document.getElementById('activityDescription').value.trim();
                const options = Array.from(document.querySelectorAll('#optionList input')).map(input => input.value.trim());

                if (!name || options.length < 2) {
                    showToast('请填写活动名称和至少两个选项', 'warning');
                    return;
                }

                try {
                    const result = await DataService.createActivity({
                        name,
                        type,
                        description,
                        options,
                        votes: {}
                    });

                    if (result.success) {
                        showToast('活动创建成功', 'success');
                        document.getElementById('createActivityModal').classList.add('hidden');
                        document.getElementById('createActivityForm').reset();
                        document.getElementById('optionList').innerHTML = `
                            <div class="flex items-center gap-2">
                                <input type="text" class="input-field flex-1 px-4 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                    placeholder="选项 1" required>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="text" class="input-field flex-1 px-4 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                    placeholder="选项 2" required>
                            </div>
                        `;
                        loadActivities();
                    } else {
                        showToast(result.message || '创建失败', 'error');
                    }
                } catch (error) {
                    showToast('创建失败: ' + error.message, 'error');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
