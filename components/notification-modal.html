<!-- 通知模态框 -->
<div id="notificationModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden modal-overlay">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[80vh] overflow-hidden modal-content mx-4">
        <div class="p-4 border-b sticky top-0 bg-white z-10">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800"><i class="fa fa-bell text-primary mr-2"></i>消息通知</h3>
                <div class="flex items-center space-x-2">
                    <button id="announceBtn" class="hidden text-primary hover:text-secondary text-sm font-medium"><i class="fa fa-bullhorn mr-1"></i>发布公告</button>
                    <button id="closeNotificationModal" class="text-gray-400 hover:text-gray-600"><i class="fa fa-times text-xl"></i></button>
                </div>
            </div>
        </div>
        <div id="notificationList" class="overflow-y-auto max-h-96">
            <div class="p-8 text-center text-gray-500">
                <i class="fa fa-bell-slash text-4xl mb-2 text-gray-300"></i>
                <p>暂无通知</p>
            </div>
        </div>
    </div>
</div>

<!-- 发布公告模态框 -->
<div id="announceModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden modal-overlay">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4">
        <div class="p-4 border-b">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800"><i class="fa fa-bullhorn text-primary mr-2"></i>发布公告</h3>
                <button id="closeAnnounceModal" class="text-gray-400 hover:text-gray-600"><i class="fa fa-times text-xl"></i></button>
            </div>
        </div>
        <div class="p-6">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">公告标题</label>
                <input type="text" id="announceTitle" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary" placeholder="请输入公告标题">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">公告内容</label>
                <textarea id="announceContent" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary" placeholder="请输入公告内容"></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">接收对象</label>
                <select id="announceTarget" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
                    <option value="all">全体成员</option>
                    <option value="admin">仅管理员</option>
                </select>
            </div>
        </div>
        <div class="p-4 border-t bg-gray-50 flex justify-end space-x-3">
            <button id="cancelAnnounce" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-xl transition-colors">取消</button>
            <button id="submitAnnounce" class="px-4 py-2 bg-primary text-white rounded-xl hover:bg-secondary transition-colors">发布</button>
        </div>
    </div>
</div>

<script>
async function renderNotifications() {
    const notifications = await DataService.getNotifications();
    const container = document.getElementById('notificationList');
    const badge = document.getElementById('notificationBadge');
    const announceBtn = document.getElementById('announceBtn');
    
    if (announceBtn) {
        announceBtn.classList.add('hidden');
        if (currentUser.role !== 'user') {
            announceBtn.classList.remove('hidden');
        }
    }
    
    let filteredNotifications = notifications;
    
    if (currentUser.role === 'user') {
        filteredNotifications = notifications.filter(n => {
            if (!n.isPrivate) return true;
            if (n.receiverId && String(n.receiverId) === String(currentUser.id)) return true;
            if (n.senderId && String(n.senderId) === String(currentUser.id)) return true;
            return false;
        });
    } else {
        filteredNotifications = notifications.filter(n => {
            if (!n.isPrivate) return true;
            if (n.receiverId === null && n.senderId !== currentUser.id) return true;
            if (n.senderId && String(n.senderId) === String(currentUser.id)) return true;
            if (n.receiverId && String(n.receiverId) === String(currentUser.id)) return true;
            return false;
        });
    }
    
    if (badge) {
        const unreadCount = filteredNotifications.filter(n => !n.read).length;
        if (unreadCount > 0) {
            badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }
    
    if (filteredNotifications.length === 0) {
        container.innerHTML = `
            <div class="p-8 text-center text-gray-500">
                <i class="fa fa-bell-slash text-4xl mb-2 text-gray-300"></i>
                <p>暂无通知</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = filteredNotifications.map(n => {
        const canReply = n.isPrivate && (
            (currentUser.role !== 'user' && n.senderId && n.senderId !== currentUser.id) ||
            (currentUser.role === 'user' && n.senderId !== currentUser.id)
        );
        
        const canDelete = currentUser.role !== 'user' || (n.senderId && String(n.senderId) === String(currentUser.id));
        
        return `
        <div class="p-4 border-b hover:bg-gray-50 ${!n.read ? 'bg-blue-50' : ''}" data-notification-id="${n.id}">
            <div class="flex items-start" onclick="handleNotificationClick(${n.id}, '${n.type}', ${n.relatedId || 'null'})">
                <div class="w-8 h-8 rounded-full ${n.isPrivate ? 'bg-purple-100' : 'bg-primary/10'} flex items-center justify-center mr-3 flex-shrink-0">
                    <i class="fa ${n.type === 'attendance' ? 'fa-calendar-check-o' : n.type === 'exam' ? 'fa-file-text-o' : n.type === 'vote' ? 'fa-check-square-o' : n.type === 'password_reset' ? 'fa-key' : n.type === 'contact' ? 'fa-envelope' : n.type === 'announcement' ? 'fa-bullhorn' : 'fa-bell'} ${n.isPrivate ? 'text-purple-600' : 'text-primary'}"></i>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-medium text-gray-800">${n.title} ${n.isPrivate ? '<span class="text-xs text-purple-600 ml-1">[私信]</span>' : ''}</p>
                    <p class="text-xs text-gray-500 mt-1">${n.message}</p>
                    <p class="text-xs text-gray-400 mt-1">${formatDateTime(n.createdAt)}</p>
                </div>
                ${!n.read ? '<span class="w-2 h-2 bg-red-500 rounded-full"></span>' : ''}
                ${canDelete ? `
                <button onclick="event.stopPropagation(); deleteNotification(${n.id})" class="text-gray-400 hover:text-red-500 ml-2"><i class="fa fa-trash text-sm"></i></button>
                ` : ''}
            </div>
            ${canReply ? `
            <div class="mt-3 pl-11">
                <div class="flex space-x-2">
                    <input type="text" id="replyInput_${n.id}" class="flex-1 px-3 py-1 text-sm border rounded-lg" placeholder="回复消息...">
                    <button onclick="replyToNotification(${n.id}, ${n.senderId})" class="px-3 py-1 bg-primary text-white text-sm rounded-lg hover:bg-secondary">回复</button>
                </div>
            </div>
            ` : ''}
        </div>
    `}).join('');
}

async function handleNotificationClick(notificationId, type, relatedId) {
    await markAsRead(notificationId);
    
    if (type === 'password_reset' && (currentUser.role === 'admin' || currentUser.role === 'subAdmin')) {
        document.getElementById('notificationModal').classList.add('hidden');
        window.location.href = 'users.html';
    }
}

async function markAsRead(id) {
    await DataService.markNotificationRead(id);
    await renderNotifications();
}

async function deleteNotification(id) {
    if (!confirm('确定要删除这条通知吗？')) return;
    
    try {
        await DataService.deleteNotification(id);
        showToast('删除成功', 'success');
        await renderNotifications();
    } catch (error) {
        console.error('删除通知失败:', error);
        showToast('删除失败，请重试', 'error');
    }
}

async function replyToNotification(notificationId, receiverId) {
    const input = document.getElementById(`replyInput_${notificationId}`);
    const message = input.value.trim();
    
    if (!message) {
        showToast('请输入回复内容', 'warning');
        return;
    }
    
    try {
        const replyNotification = {
            id: Date.now(),
            title: currentUser.role !== 'user' ? '管理员回复' : '用户回复',
            message: message,
            type: 'contact',
            senderId: currentUser.id,
            receiverId: receiverId,
            isPrivate: true,
            parentId: notificationId,
            read: false
        };
        
        await DataService.addNotification(replyNotification);
        showToast('回复已发送', 'success');
        input.value = '';
        await renderNotifications();
    } catch (error) {
        console.error('发送回复失败:', error);
        showToast('发送回复失败，请重试', 'error');
    }
}

function initNotificationModal() {
    const notificationBtn = document.getElementById('notificationBtn');
    const closeNotificationModal = document.getElementById('closeNotificationModal');
    const notificationModal = document.getElementById('notificationModal');
    const announceBtn = document.getElementById('announceBtn');
    const announceModal = document.getElementById('announceModal');
    const closeAnnounceModal = document.getElementById('closeAnnounceModal');
    const cancelAnnounce = document.getElementById('cancelAnnounce');
    const submitAnnounce = document.getElementById('submitAnnounce');
    
    if (notificationBtn) {
        notificationBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            renderNotifications();
            notificationModal.classList.remove('hidden');
        });
    }
    
    if (closeNotificationModal) {
        closeNotificationModal.addEventListener('click', () => {
            notificationModal.classList.add('hidden');
        });
    }
    
    if (notificationModal) {
        notificationModal.addEventListener('click', (e) => {
            if (e.target.id === 'notificationModal') {
                notificationModal.classList.add('hidden');
            }
        });
    }
    
    if (announceBtn) {
        announceBtn.addEventListener('click', () => {
            document.getElementById('announceTitle').value = '';
            document.getElementById('announceContent').value = '';
            document.getElementById('announceTarget').value = 'all';
            announceModal.classList.remove('hidden');
        });
    }
    
    if (closeAnnounceModal) {
        closeAnnounceModal.addEventListener('click', () => {
            announceModal.classList.add('hidden');
        });
    }
    
    if (cancelAnnounce) {
        cancelAnnounce.addEventListener('click', () => {
            announceModal.classList.add('hidden');
        });
    }
    
    if (announceModal) {
        announceModal.addEventListener('click', (e) => {
            if (e.target.id === 'announceModal') {
                announceModal.classList.add('hidden');
            }
        });
    }
    
    if (submitAnnounce) {
        submitAnnounce.addEventListener('click', async () => {
            const title = document.getElementById('announceTitle').value.trim();
            const content = document.getElementById('announceContent').value.trim();
            const target = document.getElementById('announceTarget').value;
            
            if (!title || !content) {
                showToast('请填写公告标题和内容', 'warning');
                return;
            }
            
            try {
                const notification = {
                    id: Date.now(),
                    title: `公告: ${title}`,
                    message: content,
                    type: 'announcement',
                    senderId: currentUser.id,
                    receiverId: target === 'admin' ? null : null,
                    isPrivate: false,
                    read: false
                };
                
                await DataService.addNotification(notification);
                showToast('公告发布成功', 'success');
                announceModal.classList.add('hidden');
                await renderNotifications();
            } catch (error) {
                console.error('发布公告失败:', error);
                showToast('发布公告失败，请重试', 'error');
            }
        });
    }
}
</script>
