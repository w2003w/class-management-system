    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .sidebar-link { transition: all 0.2s ease; }
        .sidebar-link:hover { background: rgba(30, 64, 175, 0.1); }
        .sidebar-link.active { background: rgba(30, 64, 175, 0.1); color: #1E40AF; font-weight: 500; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .modal-overlay { animation: fadeIn 0.2s ease; }
        .modal-content { animation: slideUp 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .progress-ring { transition: stroke-dashoffset 0.5s ease; }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .location-marker { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>

    <script>
        let currentUser = null;
        let currentAttendance = null;
        let userLocation = null;
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = { success: 'bg-green-500', error: 'bg-red-500', warning: 'bg-yellow-500', info: 'bg-blue-500' }[type] || 'bg-blue-500';
            const icon = { success: 'fa-check-circle', error: 'fa-times-circle', warning: 'fa-exclamation-circle', info: 'fa-info-circle' }[type] || 'fa-info-circle';
            
            toast.className = `toast ${bgColor} text-white px-6 py-3 rounded-xl shadow-lg flex items-center space-x-2`;
            toast.innerHTML = `<i class="fa ${icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function renderNotifications() {
            const notifications = DataStore.getNotifications();
            const container = document.getElementById('notificationList');

        function markAsRead(id) {
            DataStore.markNotificationRead(id);
            renderNotifications();
        }
        
        function formatDateTime(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }
        
        function formatTime(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }
        
        function getAttendanceStatus(attendance) {
            const now = new Date();
            const start = new Date(attendance.startTime);
            const end = new Date(attendance.endTime);
            
            if (now < start) return 'pending';
            if (now > end) return 'completed';
            return 'active';
        }
        
        function getStatusBadge(status) {
            const badges = {
                active: '<span class="px-2 py-1 bg-green-100 text-green-800 text-xs font-medium rounded-full">进行中</span>',
                pending: '<span class="px-2 py-1 bg-orange-100 text-orange-800 text-xs font-medium rounded-full">待开始</span>',
                completed: '<span class="px-2 py-1 bg-gray-100 text-gray-800 text-xs font-medium rounded-full">已结束</span>'
            };
            return badges[status] || '';
        }
        
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

            let filtered = attendances.filter(a => {
                const matchSearch = a.name.toLowerCase().includes(searchTerm) || 
                                   (a.locationName && a.locationName.toLowerCase().includes(searchTerm));
                const matchStatus = !statusFilter || getAttendanceStatus(a) === statusFilter;
                return matchSearch && matchStatus;
            });
            
            filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            const container = document.getElementById('attendanceList');
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="p-8 text-center text-gray-500">
                        <i class="fa fa-calendar-check-o text-4xl mb-2 text-gray-300"></i>

            container.innerHTML = filtered.map(attendance => {

                const signedCount = attendanceRecords.length;
                const totalUsers = users.filter(u => u.role === 'user' || u.role === 'subAdmin').length;
                const progress = totalUsers > 0 ? Math.round((signedCount / totalUsers) * 100) : 0;
                
                const userRecord = records.find(r => r.attendanceId === attendance.id && r.userId === currentUser.id);
                const hasSigned = !!userRecord;
                
                return `
                    <div class="p-4 hover:bg-gray-50 transition-colors">
                        <div class="flex items-start justify-between">
                            <div class="flex-1">
                                <div class="flex items-center space-x-2 mb-1">

                                </div>
                                <h4 class="font-semibold text-gray-800">${attendance.name}</h4>
                                <div class="flex items-center space-x-4 mt-2 text-sm text-gray-500">

                                    ${attendance.locationName ? `<span><i class="fa fa-map-marker mr-1 text-red-500"></i>${attendance.locationName}</span>` : ''}
                                </div>
                                ${attendance.description ? `<p class="text-sm text-gray-500 mt-1">${attendance.description}</p>` : ''}

                            <div class="flex items-center space-x-2 ml-4">
                                ${status === 'active' && !hasSigned ? `
                                    <button onclick="openSignModal(${attendance.id})" class="bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-green-600 transition-colors">
                                        <i class="fa fa-check mr-1"></i>签到
                                    </button>
                                ` : ''}
                                <button onclick="openDetailModal(${attendance.id})" class="bg-white text-gray-600 px-4 py-2 rounded-xl text-sm font-medium hover:bg-gray-50 transition-colors border">
                                    <i class="fa fa-eye mr-1"></i>详情
                                </button>

                                    <button onclick="deleteAttendance(${attendance.id})" class="text-red-500 hover:text-red-600 px-2">

                                    </button>

                        </div>
                        
                        <div class="mt-3">
                            <div class="flex items-center justify-between text-sm mb-1">
                                <span class="text-gray-500">签到进度</span>
                                <span class="font-medium">${signedCount}/${totalUsers} (${progress}%)</span>

            document.getElementById('totalCount').textContent = attendances.length;
            document.getElementById('activeCount').textContent = attendances.filter(a => getAttendanceStatus(a) === 'active').length;
            document.getElementById('pendingCount').textContent = attendances.filter(a => getAttendanceStatus(a) === 'pending').length;

        function openSignModal(attendanceId) {
            const attendances = DataStore.getAttendances();
            currentAttendance = attendances.find(a => a.id === attendanceId);
            
            if (!currentAttendance) {
                showToast('签到不存在', 'error');
                return;

            document.getElementById('signAttendanceName').textContent = currentAttendance.name;
            document.getElementById('signLocationName').textContent = currentAttendance.locationName || '普通签到';

            const customFieldsContainer = document.getElementById('customFieldsContainer');
            const signCustomFields = document.getElementById('signCustomFields');
            
            if (currentAttendance.customFields && currentAttendance.customFields.length > 0) {
                customFieldsContainer.classList.remove('hidden');
                signCustomFields.innerHTML = currentAttendance.customFields.map((field, index) => `
                    <div>

                    </div>

            } else {
                customFieldsContainer.classList.add('hidden');
            }
            
            document.getElementById('signModal').classList.remove('hidden');
            
            if (currentAttendance.type === 'location') {
                getUserLocation();
            } else {
                document.getElementById('locationMessage').textContent = '普通签到，无需定位';
                document.getElementById('confirmSignBtn').disabled = false;

        function closeSignModal() {
            document.getElementById('signModal').classList.add('hidden');

        function getUserLocation() {
            if (!navigator.geolocation) {
                document.getElementById('locationMessage').textContent = '您的浏览器不支持定位功能';
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    
                    if (currentAttendance && currentAttendance.latitude) {
                        const distance = calculateDistance(
                            userLocation.lat, userLocation.lng,
                            currentAttendance.latitude, currentAttendance.longitude
                        );
                        
                        const range = currentAttendance.rangeMeters || 200;
                        
                        if (distance <= range) {
                            document.getElementById('locationMessage').innerHTML = '<span class="text-green-600 font-medium"><i class="fa fa-check-circle mr-1"></i>您在签到范围内</span>';
                            document.getElementById('distanceInfo').textContent = `距离签到点约 ${Math.round(distance)} 米`;
                            document.getElementById('confirmSignBtn').disabled = false;
                        } else {
                            document.getElementById('locationMessage').innerHTML = '<span class="text-red-600 font-medium"><i class="fa fa-times-circle mr-1"></i>您不在签到范围内</span>';
                            document.getElementById('distanceInfo').textContent = `距离签到点约 ${Math.round(distance)} 米，需要在 ${range} 米范围内`;
                            document.getElementById('confirmSignBtn').disabled = true;
                        }
                    }
                },
                (error) => {
                    let message = '无法获取您的位置';
                    if (error.code === 1) message = '请授权位置权限';
                    if (error.code === 2) message = '位置信息不可用';
                    if (error.code === 3) message = '获取位置超时';
                    document.getElementById('locationMessage').textContent = message;
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

            const records = DataStore.getAttendanceRecords();
            const existingRecord = records.find(r => r.attendanceId === currentAttendance.id && r.userId === currentUser.id);
            
            if (existingRecord) {
                showToast('您已经签到过了', 'warning');
                closeSignModal();

            const customFieldValues = {};
            document.querySelectorAll('.custom-field-value').forEach(input => {
                customFieldValues[input.dataset.field] = input.value;
            });
            
            const record = {
                attendanceId: currentAttendance.id,
                attendanceName: currentAttendance.name,
                userId: currentUser.id,
                username: currentUser.username,
                name: currentUser.name,
                latitude: userLocation ? userLocation.lat : null,
                longitude: userLocation ? userLocation.lng : null,
                customFields: customFieldValues,
                remark: document.getElementById('signRemark').value,
                signedAt: new Date().toISOString()
            };
            
            DataStore.addAttendanceRecord(record);
            
            showToast('签到成功！', 'success');
            closeSignModal();
            renderAttendanceList();
        }

        function deleteAttendance(attendanceId) {
            if (!confirm('确定要删除这个签到吗？')) return;
            
            let attendances = DataStore.getAttendances();
            attendances = attendances.filter(a => a.id !== attendanceId);
            DataStore.saveAttendances(attendances);
            
            let records = DataStore.getAttendanceRecords();
            records = records.filter(r => r.attendanceId !== attendanceId);
            DataStore.saveAttendanceRecords(records);
            
            showToast('删除成功', 'success');
            renderAttendanceList();
        }
        
        function exportAttendanceData(attendanceId, type) {
            const attendances = DataStore.getAttendances();
            const attendance = attendances.find(a => a.id === attendanceId);
            const records = DataStore.getAttendanceRecords();
            const users = DataStore.getUsers();
            const allMembers = users.filter(u => u.role === 'user' || u.role === 'subAdmin');
            
            let data = [];
            
            if (type === 'signed') {
                const attendanceRecords = records.filter(r => r.attendanceId === attendanceId);
                data = attendanceRecords.map(r => ({
                    姓名: r.name,
                    账号: r.username,
                    签到时间: formatDateTime(r.signedAt),
                    备注: r.remark || ''
                }));
            } else {
                const signedUsers = records.filter(r => r.attendanceId === attendanceId).map(r => r.userId);
                const unsignedUsers = allMembers.filter(u => !signedUsers.includes(u.id));
                data = unsignedUsers.map(u => ({
                    姓名: u.name,
                    账号: u.username
                }));
            }
            
            if (data.length === 0) {
                showToast('没有数据可导出', 'warning');
                return;
            }
            
            DataStore.exportToCSV(data, `${attendance.name}_${type === 'signed' ? '已签到' : '未签到'}_${new Date().toLocaleDateString()}`);
        }
        
        function exportAllData() {
            const attendances = DataStore.getAttendances();
            const records = DataStore.getAttendanceRecords();
            
            if (attendances.length === 0) {
                showToast('没有签到数据可导出', 'warning');
                return;
            }
            
            const data = records.map(r => {
                const attendance = attendances.find(a => a.id === r.attendanceId);
                return {
                    签到名称: attendance ? attendance.name : '',
                    姓名: r.name,
                    账号: r.username,
                    签到时间: formatDateTime(r.signedAt),
                    备注: r.remark || ''
                };
            });
            
            DataStore.exportToCSV(data, `签到记录_${new Date().toLocaleDateString()}`);
        }

                    <button type="button" class="remove-field-btn text-red-500 hover:text-red-600"><i class="fa fa-times"></i></button>

            document.getElementById('customFields').addEventListener('click', (e) => {
                if (e.target.closest('.remove-field-btn')) {
                    const fieldDiv = e.target.closest('.flex');
                    if (document.querySelectorAll('#customFields > .flex').length > 1) {
                        fieldDiv.remove();
                    }
                }
            });
            
            document.getElementById('createAttendanceForm').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const type = document.getElementById('attendanceType').value;
                const latitude = document.getElementById('latitude').value;
                const longitude = document.getElementById('longitude').value;
                
                if (type === 'location' && (!latitude || !longitude)) {
                    showToast('定位签到需要获取签到中心位置', 'warning');
                    return;
                }
                
                const customFields = [];
                document.querySelectorAll('.custom-field-input').forEach(input => {
                    if (input.value.trim()) {
                        customFields.push(input.value.trim());
                    }
                });
                
                const attendance = {
                    name: document.getElementById('attendanceName').value,
                    type: type,
                    locationName: document.getElementById('locationName').value,
                    latitude: latitude ? parseFloat(latitude) : null,
                    longitude: longitude ? parseFloat(longitude) : null,
                    rangeMeters: parseInt(document.getElementById('rangeMeters').value),
                    startTime: document.getElementById('startTime').value,
                    endTime: document.getElementById('endTime').value,
                    description: document.getElementById('description').value,
                    customFields: customFields,
                    allowLate: document.getElementById('allowLate').checked,
                    createdBy: currentUser.id,
                    createdByName: currentUser.name
                };
                
                DataStore.addAttendance(attendance);
                
                showToast('签到创建成功', 'success');
                closeCreateModal();
                renderAttendanceList();
            });
            
            document.getElementById('attendanceType').addEventListener('change', (e) => {
                const locationSettings = document.getElementById('locationSettings');
                if (e.target.value === 'location') {
                    locationSettings.style.display = 'block';
                } else {
                    locationSettings.style.display = 'none';
                }
            });
            
            document.getElementById('searchInput').addEventListener('input', renderAttendanceList);
            document.getElementById('statusFilter').addEventListener('change', renderAttendanceList);
            document.getElementById('refreshBtn').addEventListener('click', renderAttendanceList);
            document.getElementById('exportBtn').addEventListener('click', exportAllData);
            
            document.getElementById('notificationBtn').addEventListener('click', () => {
                renderNotifications();
                document.getElementById('notificationModal').classList.remove('hidden');
            });
            
            document.getElementById('closeNotificationModal').addEventListener('click', () => {
                document.getElementById('notificationModal').classList.add('hidden');
            });
            
            document.getElementById('notificationModal').addEventListener('click', (e) => {
                if (e.target.id === 'notificationModal') {
                    document.getElementById('notificationModal').classList.add('hidden');
                }
            });
            
            document.getElementById('userMenuBtn').addEventListener('click', () => {
                document.getElementById('userMenu').classList.toggle('hidden');
            });
            
            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                DataStore.clearCurrentUser();
                window.location.href = 'index.html';
            });
            
            document.getElementById('logoutMenuBtn').addEventListener('click', (e) => {
                e.preventDefault();
                DataStore.clearCurrentUser();
                window.location.href = 'index.html';
            });
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#userMenuBtn') && !e.target.closest('#userMenu')) {
                    document.getElementById('userMenu').classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
