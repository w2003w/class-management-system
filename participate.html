<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>班级管理系统 - 参与</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        secondary: '#3B82F6',
                        accent: '#F97316',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .vote-option { transition: all 0.2s ease; }
        .vote-option:hover { background: #F3F4F6; }
        .vote-option.selected { background: #DBEAFE; border-color: #3B82F6; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="min-h-screen flex flex-col">
        <header class="bg-white shadow-sm sticky top-0 z-10">
            <div class="flex items-center justify-between p-4">
                <div class="flex items-center">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center">
                        <i class="fa fa-graduation-cap text-white text-lg"></i>
                    </div>
                    <div class="ml-3">
                        <h1 class="text-lg font-bold text-primary">班级管理系统</h1>
                    </div>
                </div>
            </div>
        </header>
        
        <main class="flex-1 p-4">
            <div id="loadingState" class="flex flex-col items-center justify-center py-20">
                <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-gray-500">加载中...</p>
            </div>
            
            <div id="errorState" class="hidden flex flex-col items-center justify-center py-20">
                <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mb-4">
                    <i class="fa fa-times text-red-500 text-3xl"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">出错了</h2>
                <p class="text-gray-500 mb-4" id="errorMessage">活动不存在或已结束</p>
                <a href="index.html" class="px-6 py-2 bg-primary text-white rounded-xl font-medium">返回首页</a>
            </div>
            
            <div id="loginPrompt" class="hidden">
                <div class="bg-white rounded-2xl shadow-lg p-6 mb-4">
                    <div class="text-center mb-6">
                        <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa fa-user text-blue-500 text-2xl"></i>
                        </div>
                        <h2 class="text-xl font-bold text-gray-800" id="activityTitle">参与活动</h2>
                        <p class="text-gray-500 mt-1" id="activityDesc">请先登录后再参与</p>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">账号</label>
                            <input type="text" id="loginUsername" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20" placeholder="请输入账号">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                            <input type="password" id="loginPassword" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20" placeholder="请输入密码">
                        </div>
                        <button id="loginSubmitBtn" class="w-full py-3 bg-primary text-white rounded-xl font-medium hover:bg-secondary transition-colors">
                            登录并参与
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="voteContent" class="hidden">
                <div class="bg-white rounded-2xl shadow-lg p-6 mb-4">
                    <div class="mb-6">
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 text-sm font-medium rounded-full">投票</span>
                        <h2 class="text-xl font-bold text-gray-800 mt-3" id="voteTitle"></h2>
                        <p class="text-gray-500 mt-1" id="voteDescription"></p>
                    </div>
                    
                    <form id="voteForm">
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-3">请选择</label>
                            <div id="voteOptions" class="space-y-2"></div>
                        </div>
                        
                        <div id="voteExtraFields" class="space-y-4 mb-6"></div>
                        
                        <button type="submit" class="w-full py-3 bg-primary text-white rounded-xl font-medium hover:bg-secondary transition-colors">
                            提交投票
                        </button>
                    </form>
                </div>
            </div>
            
            <div id="lotteryContent" class="hidden">
                <div class="bg-white rounded-2xl shadow-lg p-6 mb-4">
                    <div class="mb-6">
                        <span class="px-3 py-1 bg-orange-100 text-orange-700 text-sm font-medium rounded-full">抽奖</span>
                        <h2 class="text-xl font-bold text-gray-800 mt-3" id="lotteryTitle"></h2>
                        <p class="text-gray-500 mt-1" id="lotteryDescription"></p>
                    </div>
                    
                    <div class="mb-6">
                        <h4 class="text-sm font-medium text-gray-700 mb-3">奖项设置</h4>
                        <div id="prizeList" class="space-y-2"></div>
                    </div>
                    
                    <form id="lotteryForm">
                        <div id="lotteryExtraFields" class="space-y-4 mb-6"></div>
                        
                        <button type="submit" class="w-full py-3 bg-accent text-white rounded-xl font-medium hover:bg-orange-600 transition-colors">
                            <i class="fa fa-gift mr-2"></i>开始抽奖
                        </button>
                    </form>
                </div>
            </div>
            
            <div id="attendanceContent" class="hidden">
                <div class="bg-white rounded-2xl shadow-lg p-6 mb-4">
                    <div class="mb-6">
                        <span class="px-3 py-1 bg-green-100 text-green-700 text-sm font-medium rounded-full">签到</span>
                        <h2 class="text-xl font-bold text-gray-800 mt-3" id="attendanceTitle"></h2>
                        <p class="text-gray-500 mt-1" id="attendanceDescription"></p>
                    </div>
                    
                    <div id="attendanceLocationInfo" class="mb-6 hidden">
                        <div class="p-4 bg-blue-50 rounded-xl">
                            <p class="text-sm text-gray-600 mb-2"><i class="fa fa-map-marker text-red-500 mr-2"></i>签到地点：<span id="attendanceLocationName"></span></p>
                            <p class="text-sm text-gray-600"><i class="fa fa-bullseye text-blue-500 mr-2"></i>有效范围：<span id="attendanceRange"></span>米</p>
                        </div>
                    </div>
                    
                    <form id="attendanceForm">
                        <div id="attendanceLocationCheck" class="mb-4 hidden">
                            <button type="button" id="getLocationBtn" class="w-full py-3 bg-green-500 text-white rounded-xl font-medium hover:bg-green-600 transition-colors">
                                <i class="fa fa-location-arrow mr-2"></i>获取位置并签到
                            </button>
                            <p class="text-xs text-gray-500 mt-2 text-center">点击获取您的当前位置进行签到</p>
                        </div>
                        
                        <div id="attendanceExtraFields" class="space-y-4 mb-6"></div>
                        
                        <button type="submit" id="attendanceSubmitBtn" class="w-full py-3 bg-primary text-white rounded-xl font-medium hover:bg-secondary transition-colors hidden">
                            <i class="fa fa-check mr-2"></i>确认签到
                        </button>
                    </form>
                </div>
            </div>
            
            <div id="examContent" class="hidden">
                <div class="bg-white rounded-2xl shadow-lg p-6 mb-4">
                    <div class="mb-6">
                        <span class="px-3 py-1 bg-purple-100 text-purple-700 text-sm font-medium rounded-full">考试</span>
                        <h2 class="text-xl font-bold text-gray-800 mt-3" id="examTitle"></h2>
                        <p class="text-gray-500 mt-1" id="examDescription"></p>
                        <p class="text-sm text-gray-500 mt-2" id="examTimeInfo"></p>
                    </div>
                    
                    <form id="examForm">
                        <div id="examQuestions" class="space-y-6 mb-6"></div>
                        
                        <button type="submit" class="w-full py-3 bg-primary text-white rounded-xl font-medium hover:bg-secondary transition-colors">
                            <i class="fa fa-paper-plane mr-2"></i>提交试卷
                        </button>
                    </form>
                </div>
            </div>
            
            <div id="resultContent" class="hidden">
                <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
                    <div id="resultIcon" class="w-24 h-24 mx-auto mb-4 rounded-full flex items-center justify-center text-5xl"></div>
                    <h2 class="text-2xl font-bold mb-2" id="resultTitle"></h2>
                    <p class="text-gray-500 mb-6" id="resultMessage"></p>
                    <a href="dashboard.html" class="inline-block px-6 py-3 bg-primary text-white rounded-xl font-medium hover:bg-secondary transition-colors">
                        返回首页
                    </a>
                </div>
            </div>
        </main>
        
        <footer class="bg-white border-t p-4 text-center text-sm text-gray-500">
            <p>班级管理系统 © 2026</p>
        </footer>
    </div>
    
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl shadow-lg hidden z-50">
        <span id="toastMessage"></span>
    </div>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-service.js"></script>
    <script src="js/leancloud-config.js"></script>
    <script src="js/leancloud-service.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>
    <script src="js/data.js"></script>
    <script src="js/data-service.js"></script>
    <script>
        let currentUser = null;
        let activityType = null;
        let activityId = null;
        let currentActivity = null;
        
        document.addEventListener('DOMContentLoaded', async function() {
            await DataService.init();
            const params = new URLSearchParams(window.location.search);
            activityType = params.get('type');
            activityId = parseInt(params.get('id'));
            
            currentUser = await DataService.getCurrentUser();
            
            if (!activityType || !activityId) {
                showError('缺少活动参数');
                return;
            }
            
            await loadActivity();
            bindEvents();
        });
        
        async function loadActivity() {
            document.getElementById('loadingState').classList.remove('hidden');
            
            setTimeout(async () => {
                document.getElementById('loadingState').classList.add('hidden');
                
                if (activityType === 'vote') {
                    await loadVote();
                } else if (activityType === 'lottery') {
                    await loadLottery();
                } else if (activityType === 'attendance') {
                    await loadAttendance();
                } else if (activityType === 'exam') {
                    await loadExam();
                } else {
                    showError('未知的活动类型');
                }
            }, 500);
        }
        
        async function loadVote() {
            const votes = await DataService.getVotes();
            const vote = votes.find(v => v.id === activityId);
            
            if (!vote) {
                showError('投票不存在');
                return;
            }
            
            const now = new Date();
            const start = new Date(vote.startTime);
            const end = new Date(vote.endTime);
            
            if (now < start) {
                showError('投票尚未开始');
                return;
            }
            
            if (now > end) {
                showError('投票已结束');
                return;
            }
            
            const records = await DataService.getVoteRecords();
            const hasVoted = currentUser && records.some(r => r.voteId === activityId && r.userId === currentUser.id);
            
            if (hasVoted) {
                showResult(true, '已参与', '您已经参与过此投票');
                return;
            }
            
            currentActivity = vote;
            
            if (!currentUser) {
                showLoginPrompt(vote.title, '请先登录后再参与投票');
                return;
            }
            
            document.getElementById('voteTitle').textContent = vote.title;
            document.getElementById('voteDescription').textContent = vote.description || '暂无说明';
            
            const optionsHtml = vote.options.map((opt, idx) => {
                const inputType = vote.type === 'single' ? 'radio' : 'checkbox';
                return `
                    <label class="vote-option flex items-center p-4 border rounded-xl cursor-pointer">
                        <input type="${inputType}" name="voteOption" value="${idx}" class="w-5 h-5 text-primary mr-3">
                        <span class="flex-1">${opt}</span>
                    </label>
                `;
            }).join('');
            
            document.getElementById('voteOptions').innerHTML = optionsHtml;
            
            let extraFields = '';
            if (vote.needName) {
                extraFields += `
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                        <input type="text" id="voteName" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20" value="${currentUser ? currentUser.name : ''}">
                    </div>
                `;
            }
            if (vote.needPhone) {
                extraFields += `
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                        <input type="tel" id="votePhone" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20" placeholder="请输入手机号">
                    </div>
                `;
            }
            if (vote.needRemark) {
                extraFields += `
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                        <textarea id="voteRemark" rows="2" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20" placeholder="请输入备注"></textarea>
                    </div>
                `;
            }
            document.getElementById('voteExtraFields').innerHTML = extraFields;
            
            document.getElementById('voteContent').classList.remove('hidden');
        }
        
        async function loadLottery() {
            const lotteries = await DataService.getLotteries();
            const lottery = lotteries.find(l => l.id === activityId);
            
            if (!lottery) {
                showError('抽奖不存在');
                return;
            }
            
            const now = new Date();
            const start = new Date(lottery.startTime);
            const end = new Date(lottery.endTime);
            
            if (now < start) {
                showError('抽奖尚未开始');
                return;
            }
            
            if (now > end) {
                showError('抽奖已结束');
                return;
            }
            
            const records = await DataService.getLotteryRecords();
            const hasDrawn = currentUser && records.some(r => r.lotteryId === activityId && r.userId === currentUser.id);
            
            if (hasDrawn) {
                const userRecord = records.find(r => r.lotteryId === activityId && r.userId === currentUser.id);
                if (userRecord && userRecord.prize && userRecord.prize !== '未中奖') {
                    showResult(true, '恭喜中奖', `您获得了：${userRecord.prize}`);
                } else {
                    showResult(false, '已参与', '您已经参与过此抽奖，未中奖');
                }
                return;
            }
            
            currentActivity = lottery;
            
            if (!currentUser) {
                showLoginPrompt(lottery.title, '请先登录后再参与抽奖');
                return;
            }
            
            document.getElementById('lotteryTitle').textContent = lottery.title;
            document.getElementById('lotteryDescription').textContent = lottery.description || '暂无说明';
            
            const prizesHtml = lottery.prizes.map(p => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl">
                    <span class="font-medium">${p.name}</span>
                    <span class="text-sm text-gray-500">概率 ${p.probability}%</span>
                </div>
            `).join('');
            document.getElementById('prizeList').innerHTML = prizesHtml;
            
            let extraFields = '';
            if (lottery.needName) {
                extraFields += `
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                        <input type="text" id="lotteryName" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20" value="${currentUser ? currentUser.name : ''}">
                    </div>
                `;
            }
            if (lottery.needPhone) {
                extraFields += `
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                        <input type="tel" id="lotteryPhone" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20" placeholder="请输入手机号">
                    </div>
                `;
            }
            document.getElementById('lotteryExtraFields').innerHTML = extraFields;
            
            document.getElementById('lotteryContent').classList.remove('hidden');
        }
        
        async function loadAttendance() {
            const attendances = await DataService.getAttendances();
            const attendance = attendances.find(a => a.id === activityId);
            
            if (!attendance) {
                showError('签到不存在');
                return;
            }
            
            const now = new Date();
            const start = new Date(attendance.startTime);
            const end = new Date(attendance.endTime);
            
            if (now < start) {
                showError('签到尚未开始');
                return;
            }
            
            if (now > end) {
                showError('签到已结束');
                return;
            }
            
            const records = await DataService.getAttendanceRecords();
            const hasSigned = currentUser && records.some(r => r.attendanceId === activityId && r.userId === currentUser.id);
            
            if (hasSigned) {
                showResult(true, '已签到', '您已经完成签到');
                return;
            }
            
            currentActivity = attendance;
            
            if (!currentUser) {
                showLoginPrompt(attendance.name, '请先登录后再签到');
                return;
            }
            
            document.getElementById('attendanceTitle').textContent = attendance.name;
            document.getElementById('attendanceDescription').textContent = attendance.description || '暂无说明';
            
            if (attendance.type === 'location') {
                document.getElementById('attendanceLocationInfo').classList.remove('hidden');
                document.getElementById('attendanceLocationName').textContent = attendance.locationName || '未设置';
                document.getElementById('attendanceRange').textContent = attendance.rangeMeters || 200;
                document.getElementById('attendanceLocationCheck').classList.remove('hidden');
            } else {
                document.getElementById('attendanceSubmitBtn').classList.remove('hidden');
            }
            
            let extraFields = '';
            if (attendance.customFields && attendance.customFields.length > 0) {
                attendance.customFields.forEach((field, idx) => {
                    extraFields += `
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">${field}</label>
                            <input type="text" id="customField_${idx}" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20" placeholder="请输入${field}">
                        </div>
                    `;
                });
            }
            document.getElementById('attendanceExtraFields').innerHTML = extraFields;
            
            document.getElementById('attendanceContent').classList.remove('hidden');
        }
        
        async function loadExam() {
            const exams = await DataService.getExams();
            const exam = exams.find(e => e.id === activityId);
            
            if (!exam) {
                showError('考试不存在');
                return;
            }
            
            const now = new Date();
            const start = new Date(exam.startTime);
            const end = new Date(exam.endTime);
            
            if (now < start) {
                showError('考试尚未开始');
                return;
            }
            
            if (now > end) {
                showError('考试已结束');
                return;
            }
            
            const results = await DataService.getExamResults();
            const hasSubmitted = currentUser && results.some(r => r.examId === activityId && r.userId === currentUser.id);
            
            if (hasSubmitted) {
                showResult(true, '已提交', '您已经完成考试');
                return;
            }
            
            currentActivity = exam;
            
            if (!currentUser) {
                showLoginPrompt(exam.title, '请先登录后再参加考试');
                return;
            }
            
            document.getElementById('examTitle').textContent = exam.title;
            document.getElementById('examDescription').textContent = exam.description || '暂无说明';
            document.getElementById('examTimeInfo').textContent = `考试时长：${exam.duration || 60}分钟`;
            
            let questionsHtml = '';
            if (exam.questions && exam.questions.length > 0) {
                exam.questions.forEach((q, qIdx) => {
                    questionsHtml += `
                        <div class="p-4 bg-gray-50 rounded-xl">
                            <p class="font-medium text-gray-800 mb-3">${qIdx + 1}. ${q.question}</p>
                            <div class="space-y-2">
                    `;
                    
                    if (q.type === 'single') {
                        q.options.forEach((opt, oIdx) => {
                            questionsHtml += `
                                <label class="flex items-center p-3 bg-white rounded-lg cursor-pointer border hover:border-primary">
                                    <input type="radio" name="question_${qIdx}" value="${oIdx}" class="w-4 h-4 text-primary mr-3">
                                    <span>${opt}</span>
                                </label>
                            `;
                        });
                    } else if (q.type === 'multiple') {
                        q.options.forEach((opt, oIdx) => {
                            questionsHtml += `
                                <label class="flex items-center p-3 bg-white rounded-lg cursor-pointer border hover:border-primary">
                                    <input type="checkbox" name="question_${qIdx}" value="${oIdx}" class="w-4 h-4 text-primary mr-3">
                                    <span>${opt}</span>
                                </label>
                            `;
                        });
                    } else if (q.type === 'text') {
                        questionsHtml += `
                            <textarea name="question_${qIdx}" rows="3" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20" placeholder="请输入答案"></textarea>
                        `;
                    }
                    
                    questionsHtml += '</div></div>';
                });
            }
            document.getElementById('examQuestions').innerHTML = questionsHtml;
            
            document.getElementById('examContent').classList.remove('hidden');
        }
        
        function showLoginPrompt(title, desc) {
            document.getElementById('activityTitle').textContent = title;
            document.getElementById('activityDesc').textContent = desc;
            document.getElementById('loginPrompt').classList.remove('hidden');
        }
        
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorState').classList.remove('hidden');
        }
        
        function showResult(isWin, title, message) {
            const icon = document.getElementById('resultIcon');
            
            if (isWin) {
                icon.className = 'w-24 h-24 mx-auto mb-4 rounded-full flex items-center justify-center text-5xl bg-yellow-100';
                icon.innerHTML = '🎁';
                document.getElementById('resultTitle').className = 'text-2xl font-bold mb-2 text-yellow-600';
            } else {
                icon.className = 'w-24 h-24 mx-auto mb-4 rounded-full flex items-center justify-center text-5xl bg-gray-100';
                icon.innerHTML = '😢';
                document.getElementById('resultTitle').className = 'text-2xl font-bold mb-2 text-gray-600';
            }
            
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('resultContent').classList.remove('hidden');
        }
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl shadow-lg z-50 ${type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500'} text-white`;
            toastMessage.textContent = message;
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }
        
        function bindEvents() {
            document.getElementById('loginSubmitBtn').addEventListener('click', async function() {
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                
                if (!username || !password) {
                    showToast('请输入账号和密码', 'error');
                    return;
                }
                
                const user = await DataService.getUserByUsername(username);
                if (!user || user.password !== password) {
                    showToast('账号或密码错误', 'error');
                    return;
                }
                
                await DataService.setCurrentUser(user);
                currentUser = user;
                
                document.getElementById('loginPrompt').classList.add('hidden');
                
                if (activityType === 'vote') {
                    await loadVote();
                } else if (activityType === 'lottery') {
                    await loadLottery();
                } else if (activityType === 'attendance') {
                    await loadAttendance();
                } else if (activityType === 'exam') {
                    await loadExam();
                }
            });
            
            document.getElementById('voteForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const selectedOptions = [];
                document.querySelectorAll('input[name="voteOption"]:checked').forEach(input => {
                    selectedOptions.push(parseInt(input.value));
                });
                
                if (selectedOptions.length === 0) {
                    showToast('请选择至少一个选项', 'error');
                    return;
                }
                
                const record = {
                    voteId: currentActivity.id,
                    userId: currentUser.id,
                    username: currentUser.username,
                    participantName: currentActivity.needName ? document.getElementById('voteName')?.value : '',
                    participantPhone: currentActivity.needPhone ? document.getElementById('votePhone')?.value : '',
                    remark: currentActivity.needRemark ? document.getElementById('voteRemark')?.value : '',
                    selectedOptions: selectedOptions,
                    participatedAt: new Date().toISOString()
                };
                
                await DataService.addVoteRecord(record);
                
                document.getElementById('voteContent').classList.add('hidden');
                showResult(true, '投票成功', '感谢您的参与！');
            });
            
            document.getElementById('lotteryForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                let prize = null;
                const random = Math.random() * 100;
                let cumulative = 0;
                
                for (const p of currentActivity.prizes) {
                    cumulative += p.probability;
                    if (random < cumulative) {
                        prize = p.name;
                        break;
                    }
                }
                
                const record = {
                    lotteryId: currentActivity.id,
                    userId: currentUser.id,
                    username: currentUser.username,
                    participantName: currentActivity.needName ? document.getElementById('lotteryName')?.value : '',
                    participantPhone: currentActivity.needPhone ? document.getElementById('lotteryPhone')?.value : '',
                    prize: prize,
                    participatedAt: new Date().toISOString()
                };
                
                await DataService.addLotteryRecord(record);
                
                document.getElementById('lotteryContent').classList.add('hidden');
                
                if (prize) {
                    showResult(true, '恭喜中奖', `您获得了：${prize}`);
                } else {
                    showResult(false, '很遗憾', '未中奖，下次再接再厉！');
                }
            });
            
            document.getElementById('getLocationBtn').addEventListener('click', function() {
                if (!navigator.geolocation) {
                    showToast('您的浏览器不支持定位功能', 'error');
                    return;
                }
                
                showToast('正在获取位置...', 'info');
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLat = position.coords.latitude;
                        const userLng = position.coords.longitude;
                        const targetLat = currentActivity.latitude;
                        const targetLng = currentActivity.longitude;
                        const range = currentActivity.rangeMeters || 200;
                        
                        const distance = calculateDistance(userLat, userLng, targetLat, targetLng);
                        
                        if (distance <= range) {
                            document.getElementById('attendanceLocationCheck').classList.add('hidden');
                            document.getElementById('attendanceSubmitBtn').classList.remove('hidden');
                            showToast('位置验证成功，请确认签到', 'success');
                        } else {
                            showToast(`您当前位置距离签到点${Math.round(distance)}米，超出有效范围${range}米`, 'error');
                        }
                    },
                    (error) => {
                        let message = '无法获取位置';
                        if (error.code === 1) message = '请授权位置权限';
                        showToast(message, 'error');
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
            
            document.getElementById('attendanceForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const customFieldValues = {};
                if (currentActivity.customFields) {
                    currentActivity.customFields.forEach((field, idx) => {
                        customFieldValues[field] = document.getElementById(`customField_${idx}`)?.value || '';
                    });
                }
                
                const record = {
                    attendanceId: currentActivity.id,
                    userId: currentUser.id,
                    username: currentUser.username,
                    customFields: customFieldValues,
                    signedAt: new Date().toISOString()
                };
                
                await DataService.addAttendanceRecord(record);
                
                document.getElementById('attendanceContent').classList.add('hidden');
                showResult(true, '签到成功', '您已完成签到');
            });
            
            document.getElementById('examForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const answers = [];
                if (currentActivity.questions) {
                    currentActivity.questions.forEach((q, qIdx) => {
                        if (q.type === 'single') {
                            const selected = document.querySelector(`input[name="question_${qIdx}"]:checked`);
                            answers.push(selected ? parseInt(selected.value) : -1);
                        } else if (q.type === 'multiple') {
                            const selected = document.querySelectorAll(`input[name="question_${qIdx}"]:checked`);
                            answers.push(Array.from(selected).map(s => parseInt(s.value)));
                        } else if (q.type === 'text') {
                            answers.push(document.querySelector(`textarea[name="question_${qIdx}"]`)?.value || '');
                        }
                    });
                }
                
                let score = 0;
                currentActivity.questions.forEach((q, qIdx) => {
                    if (q.type === 'single' && answers[qIdx] === q.correctAnswer) {
                        score += q.score || 0;
                    } else if (q.type === 'multiple' && JSON.stringify(answers[qIdx].sort()) === JSON.stringify(q.correctAnswer.sort())) {
                        score += q.score || 0;
                    }
                });
                
                const result = {
                    examId: currentActivity.id,
                    userId: currentUser.id,
                    username: currentUser.username,
                    answers: answers,
                    score: score,
                    submittedAt: new Date().toISOString()
                };
                
                await DataService.addExamResult(result);
                
                document.getElementById('examContent').classList.add('hidden');
                showResult(true, '提交成功', `您的得分：${score}分`);
            });
        }
        
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
    </script>
