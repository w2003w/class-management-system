<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理系统 - 仪表盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/premium-ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 260px;
            z-index: 100;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
            margin-bottom: 16px;
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .sidebar-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }
        
        .sidebar-logo-text h2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }
        
        .sidebar-logo-text p {
            font-size: 12px;
            color: var(--text-muted);
            margin: 2px 0 0;
        }
        
        .sidebar-nav {
            padding: 0 12px;
        }
        
        .sidebar-item {
            margin-bottom: 4px;
        }
        
        .sidebar-item.active .sidebar-link {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.1));
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }
        
        .sidebar-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 14px;
        }
        
        .sidebar-link:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--text-primary);
        }
        
        .sidebar-link i {
            width: 24px;
            font-size: 18px;
            margin-right: 12px;
        }
        
        .sidebar-link span {
            flex: 1;
        }
        
        .sidebar-link .badge {
            padding: 2px 8px;
            font-size: 11px;
        }
        
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
            padding: 24px;
        }
        
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .header-title h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }
        
        .header-title p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 4px 0 0;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .search-box {
            position: relative;
            max-width: 300px;
        }
        
        .search-box input {
            padding-left: 40px;
        }
        
        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .user-menu {
            position: relative;
            cursor: pointer;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }
            .sidebar { width: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(99, 102, 241, 0.2);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .stat-card.blue::before { background: linear-gradient(90deg, #3B82F6, #60A5FA); }
        .stat-card.green::before { background: linear-gradient(90deg, #10B981, #34D399); }
        .stat-card.purple::before { background: linear-gradient(90deg, #8B5CF6, #A78BFA); }
        .stat-card.orange::before { background: linear-gradient(90deg, #F59E0B, #FBBF24); }
        
        .stat-card:hover::before { opacity: 1; }
        
        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .stat-card.blue .stat-icon { background: rgba(59, 130, 246, 0.15); color: #60A5FA; }
        .stat-card.green .stat-icon { background: rgba(16, 185, 129, 0.15); color: #34D399; }
        .stat-card.purple .stat-icon { background: rgba(139, 92, 246, 0.15); color: #A78BFA; }
        .stat-card.orange .stat-icon { background: rgba(245, 158, 11, 0.15); color: #FBBF24; }
        
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .stat-trend {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .stat-trend.up { color: var(--success); }
        .stat-trend.down { color: var(--danger); }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 768px) {
            .quick-actions { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 480px) {
            .quick-actions { grid-template-columns: 1fr; }
        }
        
        .quick-action-card {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quick-action-card:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
        }
        
        .quick-action-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
        }
        
        .quick-action-card:nth-child(1) .quick-action-icon { background: rgba(59, 130, 246, 0.15); color: #60A5FA; }
        .quick-action-card:nth-child(2) .quick-action-icon { background: rgba(16, 185, 129, 0.15); color: #34D399; }
        .quick-action-card:nth-child(3) .quick-action-icon { background: rgba(245, 158, 11, 0.15); color: #FBBF24; }
        .quick-action-card:nth-child(4) .quick-action-icon { background: rgba(139, 92, 246, 0.15); color: #A78BFA; }
        .quick-action-card:nth-child(5) .quick-action-icon { background: rgba(6, 182, 212, 0.15); color: #22D3EE; }
        .quick-action-card:nth-child(6) .quick-action-icon { background: rgba(239, 68, 68, 0.15); color: #F87171; }
        
        .quick-action-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 4px;
        }
        
        .quick-action-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin: 0;
        }
        
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        
        @media (max-width: 1024px) {
            .bottom-grid { grid-template-columns: 1fr; }
        }
        
        .activity-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .activity-item:hover {
            background: rgba(99, 102, 241, 0.08);
        }
        
        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .activity-dot.success { background: var(--success); }
        .activity-dot.warning { background: var(--warning); }
        .activity-dot.info { background: var(--info); }
        
        .activity-content {
            flex: 1;
            min-width: 0;
        }
        
        .activity-title {
            font-size: 14px;
            color: var(--text-primary);
            margin: 0 0 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .activity-time {
            font-size: 12px;
            color: var(--text-muted);
            margin: 0;
        }
        
        .chart-container {
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chart-bars {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 200px;
            width: 100%;
            padding: 0 20px;
        }
        
        .chart-bar {
            width: 32px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 8px 8px 0 0;
            transition: height 1s ease;
            position: relative;
        }
        
        .chart-bar::after {
            content: attr(data-value);
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .chart-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            margin-top: 12px;
        }
        
        .chart-label {
            width: 32px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .mobile-menu-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
        }
        
        @media (max-width: 640px) {
            .mobile-menu-btn { display: block; }
        }
        
        .logout-modal {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(99, 102, 241, 0.2);
            z-index: 200;
            transition: right 0.3s ease;
            padding: 24px;
        }
        
        .logout-modal.open { right: 0; }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            z-index: 150;
            display: none;
        }
        
        .modal-overlay.open { display: block; }
        
        .modal-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
            margin-bottom: 20px;
        }
        
        .modal-user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .modal-user-info h3 {
            font-size: 16px;
            color: var(--text-primary);
            margin: 0;
        }
        
        .modal-user-info p {
            font-size: 12px;
            color: var(--text-muted);
            margin: 2px 0 0;
        }
        
        .modal-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .modal-links li {
            margin-bottom: 8px;
        }
        
        .modal-links a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .modal-links a:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--text-primary);
        }
        
        .modal-links a i {
            width: 20px;
        }
        
        .modal-logout {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(71, 85, 105, 0.3);
        }
        
        .modal-logout-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .modal-logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div class="sidebar-logo-text">
                    <h2>班级管理系统</h2>
                    <p>综合管理平台</p>
                </div>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <div class="sidebar-item active">
                <a href="dashboard.html" class="sidebar-link">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>仪表盘</span>
                </a>
            </div>
            <div class="sidebar-item">
                <a href="attendance-new.html" class="sidebar-link">
                    <i class="fa-solid fa-check-circle"></i>
                    <span>签到管理</span>
                </a>
            </div>
            <div class="sidebar-item">
                <a href="exam.html" class="sidebar-link">
                    <i class="fa-solid fa-file-text"></i>
                    <span>考试系统</span>
                </a>
            </div>
            <div class="sidebar-item">
                <a href="vote.html" class="sidebar-link">
                    <i class="fa-solid fa-check-square"></i>
                    <span>投票抽奖</span>
                </a>
            </div>
            <div class="sidebar-item">
                <a href="chat.html" class="sidebar-link">
                    <i class="fa-solid fa-comments"></i>
                    <span>班级群聊</span>
                </a>
            </div>
            <div class="sidebar-item">
                <a href="users.html" class="sidebar-link">
                    <i class="fa-solid fa-users"></i>
                    <span>用户管理</span>
                </a>
            </div>
            <div class="sidebar-item">
                <a href="settings.html" class="sidebar-link">
                    <i class="fa-solid fa-cog"></i>
                    <span>系统设置</span>
                </a>
            </div>
        </nav>
    </div>

    <div class="main-content">
        <div class="page-header">
            <div class="header-title">
                <h1>欢迎回来</h1>
                <p>今天是 <span id="currentDate"></span></p>
            </div>
            <div class="header-actions">
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="search-box search-container">
                    <input type="text" class="input-field" placeholder="搜索...">
                    <i class="fa-solid fa-search"></i>
                </div>
                <div class="user-menu" onclick="toggleLogoutModal()">
                    <div class="user-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card blue">
                <div class="stat-header">
                    <div class="stat-icon">
                        <i class="fa-solid fa-users"></i>
                    </div>
                </div>
                <div class="stat-value" id="totalUsers">-</div>
                <div class="stat-label">班级成员</div>
                <div class="stat-trend up">
                    <i class="fa-solid fa-arrow-up"></i>
                    <span id="usersTrend">-</span>
                </div>
            </div>
            
            <div class="stat-card green">
                <div class="stat-header">
                    <div class="stat-icon">
                        <i class="fa-solid fa-check-circle"></i>
                    </div>
                </div>
                <div class="stat-value" id="checkinRate">-</div>
                <div class="stat-label">签到率</div>
                <div class="stat-trend up">
                    <i class="fa-solid fa-arrow-up"></i>
                    <span id="checkinTrend">-</span>
                </div>
            </div>
            
            <div class="stat-card purple">
                <div class="stat-header">
                    <div class="stat-icon">
                        <i class="fa-solid fa-file-text"></i>
                    </div>
                </div>
                <div class="stat-value" id="examCount">-</div>
                <div class="stat-label">进行中考试</div>
                <div class="stat-trend down">
                    <i class="fa-solid fa-arrow-down"></i>
                    <span id="examTrend">-</span>
                </div>
            </div>
            
            <div class="stat-card orange">
                <div class="stat-header">
                    <div class="stat-icon">
                        <i class="fa-solid fa-comments"></i>
                    </div>
                </div>
                <div class="stat-value" id="messageCount">-</div>
                <div class="stat-label">今日消息</div>
                <div class="stat-trend up">
                    <i class="fa-solid fa-arrow-up"></i>
                    <span id="messageTrend">-</span>
                </div>
            </div>
        </div>

        <div class="quick-actions">
            <div class="quick-action-card" onclick="window.location.href='attendance-new.html'">
                <div class="quick-action-icon">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <h3 class="quick-action-title">发起签到</h3>
                <p class="quick-action-desc">快速创建签到活动</p>
            </div>
            
            <div class="quick-action-card" onclick="window.location.href='exam.html'">
                <div class="quick-action-icon">
                    <i class="fa-solid fa-pen-to-square"></i>
                </div>
                <h3 class="quick-action-title">创建考试</h3>
                <p class="quick-action-desc">发布新的考试任务</p>
            </div>
            
            <div class="quick-action-card" onclick="window.location.href='vote.html'">
                <div class="quick-action-icon">
                    <i class="fa-solid fa-gift"></i>
                </div>
                <h3 class="quick-action-title">发起抽奖</h3>
                <p class="quick-action-desc">组织班级抽奖活动</p>
            </div>
            
            <div class="quick-action-card" onclick="window.location.href='vote.html'">
                <div class="quick-action-icon">
                    <i class="fa-solid fa-poll"></i>
                </div>
                <h3 class="quick-action-title">创建投票</h3>
                <p class="quick-action-desc">发起班级投票</p>
            </div>
            
            <div class="quick-action-card" onclick="window.location.href='chat.html'">
                <div class="quick-action-icon">
                    <i class="fa-solid fa-message"></i>
                </div>
                <h3 class="quick-action-title">发送通知</h3>
                <p class="quick-action-desc">发布班级通知</p>
            </div>
            
            <div class="quick-action-card" onclick="window.location.href='users.html'">
                <div class="quick-action-icon">
                    <i class="fa-solid fa-user-plus"></i>
                </div>
                <h3 class="quick-action-title">添加成员</h3>
                <p class="quick-action-desc">邀请新成员加入</p>
            </div>
        </div>

        <div class="bottom-grid">
            <div class="glass-card rounded-2xl p-6">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fa-solid fa-chart-line text-primary"></i>
                        签到趋势
                    </h3>
                </div>
                <div class="chart-container">
                    <div class="chart-bars" id="checkinChartBars"></div>
                </div>
                <div class="chart-labels" id="checkinChartLabels">
                    <span class="chart-label">周一</span>
                    <span class="chart-label">周二</span>
                    <span class="chart-label">周三</span>
                    <span class="chart-label">周四</span>
                    <span class="chart-label">周五</span>
                    <span class="chart-label">周六</span>
                    <span class="chart-label">周日</span>
                </div>
            </div>
            
            <div class="glass-card rounded-2xl p-6">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fa-solid fa-clock text-primary"></i>
                        最近动态
                    </h3>
                </div>
                <div class="space-y-4" id="recentActivity">
                    <div class="activity-item text-center py-8 text-muted">
                        <i class="fa-solid fa-inbox fa-3x mb-2 opacity-50"></i>
                        <p>暂无活动记录</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="toggleLogoutModal()"></div>
    <div class="logout-modal" id="logoutModal">
        <div class="modal-user">

                <a href="profile.html">

                    <i class="fa-solid fa-cog"></i>

    <script src="https://unpkg.com/@supabase/supabase-js@2?v=4"></script>
    <script src="js/supabase-config.js?v=4"></script>
    <script src="js/supabase-service.js?v=4"></script>
    <script src="js/leancloud-config.js?v=4"></script>
    <script src="js/leancloud-service.js?v=4"></script>
    <script src="js/firebase-config.js?v=4"></script>
    <script src="js/firebase-service.js?v=4"></script>
    <script src="js/data.js?v=4"></script>
    <script src="js/data-service.js?v=4"></script>
    <script>
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', options);
        }
        
        updateDate();
        
        async function loadDashboardData() {
            try {
                await DataService.init();
                const currentUser = await DataService.getCurrentUser();
                const users = await DataService.getUsers();
                const attendances = await DataService.getAttendances();
                const attendanceRecords = await DataService.getAttendanceRecords();
                const exams = await DataService.getExams();
                const votes = await DataService.getVotes();
                const notifications = await DataService.getNotifications();
                
                let filteredUsers = users;
                if (currentUser && currentUser.role !== 'admin') {
                    filteredUsers = users.filter(u => String(u.group_id) === String(currentUser.group_id));
                }
                
                document.getElementById('totalUsers').textContent = filteredUsers.length;
            
            const today = new Date().toISOString().split('T')[0];
            const todayRecords = attendanceRecords.filter(r => r.createdAt && r.createdAt.startsWith(today));
            const activeAttendances = attendances.filter(a => a.status === 'active');
            
            let checkinRate = 0;
                if (activeAttendances.length > 0 && filteredUsers.length > 0) {
                    checkinRate = Math.round((todayRecords.length / filteredUsers.length) * 100);
                }
                document.getElementById('checkinRate').textContent = checkinRate + '%';
                
                const ongoingExams = exams.filter(e => {
                    const endTime = new Date(e.endTime);
                    return endTime > new Date();
                });
                document.getElementById('examCount').textContent = ongoingExams.length;
                
                const todayMessages = notifications.filter(n => n.createdAt && n.createdAt.startsWith(today));
                document.getElementById('messageCount').textContent = todayMessages.length;
                
                renderCheckinChart(attendanceRecords);
                renderRecentActivity(attendanceRecords, exams, votes, filteredUsers);
            } catch (error) {
                console.error('加载仪表盘数据失败:', error);
            }
        }
        
        function renderCheckinChart(records) {
            const days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            const counts = [0, 0, 0, 0, 0, 0, 0];
            
            const now = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const dayIndex = date.getDay();
                const dayOfWeek = dayIndex === 0 ? 6 : dayIndex - 1;
                counts[dayOfWeek] += records.filter(r => r.createdAt && r.createdAt.startsWith(dateStr)).length;
            }
            
            const maxCount = Math.max(...counts, 1);
            const barsContainer = document.getElementById('checkinChartBars');
            barsContainer.innerHTML = '';
            
            counts.forEach(count => {
                const height = (count / maxCount) * 100;
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.dataset.value = count;
                bar.style.height = height + '%';
                barsContainer.appendChild(bar);
            });
        }
        
        function renderRecentActivity(attendanceRecords, exams, votes, users) {
            const activities = [];
            
            attendanceRecords.forEach(record => {
                const user = users.find(u => u.id === record.userId);
                if (user) {
                    activities.push({
                        type: 'attendance',
                        user: user.name,
                        time: record.createdAt,
                        action: '完成了签到'
                    });
                }
            });
            
            exams.forEach(exam => {
                activities.push({
                    type: 'exam',
                    user: exam.createdBy || '管理员',
                    time: exam.createdAt,
                    action: '创建了考试: ' + exam.title
                });
            });
            
            votes.forEach(vote => {
                activities.push({
                    type: 'vote',
                    user: vote.createdBy || '管理员',
                    time: vote.createdAt,
                    action: '创建了投票: ' + vote.title
                });
            });
            
            activities.sort((a, b) => new Date(b.time) - new Date(a.time));
            
            const container = document.getElementById('recentActivity');
            
            if (activities.length === 0) {
                container.innerHTML = `
                    <div class="activity-item text-center py-8 text-muted">
                        <i class="fa-solid fa-inbox fa-3x mb-2 opacity-50"></i>
                        <p>暂无活动记录</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = activities.slice(0, 5).map(act => {
                let dotClass = 'success';
                if (act.type === 'exam') dotClass = 'warning';
                if (act.type === 'vote') dotClass = 'info';
                
                const timeAgo = formatTimeAgo(act.time);
                
                return `
                    <div class="activity-item">
                        <div class="activity-dot ${dotClass}"></div>
                        <div class="activity-content">
                            <h4 class="activity-title">${act.user} ${act.action}</h4>
                            <p class="activity-time">${timeAgo}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function formatTimeAgo(dateStr) {
            if (!dateStr) return '未知时间';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return '刚刚';
            if (minutes < 60) return minutes + '分钟前';
            if (hours < 24) return hours + '小时前';
            if (days < 7) return days + '天前';
            return date.toLocaleDateString('zh-CN');
        }
        
        function toggleLogoutModal() {
            const modal = document.getElementById('logoutModal');
            const overlay = document.getElementById('modalOverlay');
            
            modal.classList.toggle('open');
            overlay.classList.toggle('open');
        }
        
        function toggleMobileMenu() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('open');
        }
        
        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboardData();
        });
    </script>
</body>
