﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>班级管理系统 - 考试系统</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F172A">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/premium-ui.css">
    <style>
        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
        }

        .sidebar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(99, 102, 241, 0.1);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateX(4px);
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            position: relative;
        }

        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #6366F1, #8B5CF6);
            border-radius: 0 3px 3px 0;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: medium;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }

        .status-ended {
            background: rgba(107, 114, 128, 0.2);
            color: #9CA3AF;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
        }

        .nav-item {
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            color: #6366F1;
        }

        .dropdown-menu {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .dropdown-item:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .start-exam-btn {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            transition: all 0.3s ease;
        }

        .start-exam-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
        }

        .question-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.1);
            transition: all 0.3s ease;
        }

        .question-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
        }

        .option-item {
            transition: all 0.3s ease;
        }

        .option-item:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .option-item.selected {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366F1;
        }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar fixed lg:sticky top-0 left-0 h-full w-64 flex flex-col z-40">
            <div class="p-6 border-b border-gray-700/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center shadow-lg">
                        <i class="fa-solid fa-graduation-cap text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white">班级管理系统</h1>
                        <p class="text-xs text-gray-400 hidden sm:block">大学生综合管理平台</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 p-4 space-y-1">
                <a href="dashboard.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-chart-pie text-lg"></i>
                    <span class="font-medium">数据概览</span>
                </a>
                <a href="attendance-new.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-map-marker text-lg"></i>
                    <span class="font-medium">签到管理</span>
                </a>
                <a href="exam.html" class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-file-text text-lg"></i>
                    <span class="font-medium">考试系统</span>
                </a>
                <a href="vote.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-check-square-o text-lg"></i>
                    <span class="font-medium">投票抽奖</span>
                </a>
                <a href="chat.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-comments text-lg"></i>
                    <span class="font-medium">实时聊天</span>
                </a>
                <a href="users.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-users text-lg"></i>
                    <span class="font-medium">成员管理</span>
                </a>
                <a href="settings.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-cog text-lg"></i>
                    <span class="font-medium">系统设置</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-700/50">
                <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-colors">
                    <i class="fa-solid fa-right-from-bracket text-lg"></i>
                    <span class="font-medium">退出登录</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-[#0F172A]/80 backdrop-blur-md border-b border-gray-700/50 sticky top-0 z-30">
                <div class="px-6 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-white">考试系统</h2>
                        <p class="text-sm text-gray-400">管理和参加班级考试</p>
                    </div>

                    <div class="flex items-center gap-4">
                        <button id="createExamBtn" class="btn-primary px-5 py-2.5 rounded-xl text-white font-medium flex items-center gap-2">
                            <i class="fa-solid fa-plus"></i> 创建考试
                        </button>

                        <div class="relative">
                            <button id="userMenuBtn" class="nav-item flex items-center gap-3 px-3 py-2 rounded-xl text-gray-400 hover:text-white">
                                <div class="w-8 h-8 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-white font-medium">
                                    <i class="fa-solid fa-user"></i>
                                </div>
                                <span class="hidden sm:block font-medium">管理员</span>
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </button>
                            <div id="userDropdown" class="dropdown-menu hidden absolute right-0 top-full mt-2 w-48 rounded-xl p-2 shadow-xl">
                                <a href="profile.html" class="dropdown-item flex items-center gap-2 px-3 py-2 rounded-lg text-gray-300 hover:text-white">
                                    <i class="fa-solid fa-user"></i> 个人资料
                                </a>
                                <a href="settings.html" class="dropdown-item flex items-center gap-2 px-3 py-2 rounded-lg text-gray-300 hover:text-white">
                                    <i class="fa-solid fa-cog"></i> 设置
                                </a>
                                <div class="border-t border-gray-700/50 my-1"></div>
                                <button id="userMenuLogoutBtn" class="dropdown-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-red-400 hover:text-red-300">
                                    <i class="fa-solid fa-right-from-bracket"></i> 退出登录
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="p-6">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2">
                        <div id="examList" class="space-y-4">
                        </div>
                    </div>

                    <div class="lg:col-span-1">
                        <div class="glass-card rounded-2xl p-6 sticky top-24">
                            <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                <i class="fa-solid fa-clock text-primary"></i> 考试统计
                            </h3>
                            <div class="space-y-4">
                                <div class="flex items-center justify-between p-4 bg-gray-800/30 rounded-xl">
                                    <span class="text-gray-400">进行中</span>
                                    <span id="activeCount" class="text-2xl font-bold text-green-400">0</span>
                                </div>
                                <div class="flex items-center justify-between p-4 bg-gray-800/30 rounded-xl">
                                    <span class="text-gray-400">已完成</span>
                                    <span id="completedCount" class="text-2xl font-bold text-gray-400">0</span>
                                </div>
                                <div class="flex items-center justify-between p-4 bg-gray-800/30 rounded-xl">
                                    <span class="text-gray-400">总考试数</span>
                                    <span id="totalCount" class="text-2xl font-bold text-primary">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="createExamModal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="glass-card rounded-2xl p-6 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">
                    <i class="fa-solid fa-file-plus text-primary mr-2"></i>创建考试
                </h3>
                <button id="closeCreateModal" class="text-gray-400 hover:text-gray-200 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <form id="createExamForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">考试名称</label>
                    <input type="text" id="examName" 
                        class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100"
                        placeholder="例如: 高等数学期中考试" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">开始时间</label>
                        <input type="datetime-local" id="examStart" 
                            class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">结束时间</label>
                        <input type="datetime-local" id="examEnd" 
                            class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">考试时长(分钟)</label>
                    <input type="number" id="examDuration" 
                        class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100"
                        placeholder="60" min="5" max="300">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">考试说明</label>
                    <textarea id="examDescription" rows="3"
                        class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100 resize-none"
                        placeholder="添加考试说明..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-3">题目列表</label>
                    <div id="questionList" class="space-y-3">
                        <div class="question-card p-4 rounded-xl">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm font-medium text-primary">题目 1</span>
                                <button type="button" class="text-gray-400 hover:text-red-400">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                            <input type="text" class="input-field w-full px-4 py-2 rounded-lg outline-none text-gray-100 text-sm mb-2"
                                placeholder="请输入题目内容" required>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                    placeholder="选项 A" required>
                                <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                    placeholder="选项 B" required>
                                <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                    placeholder="选项 C" required>
                                <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                    placeholder="选项 D" required>
                            </div>
                            <div class="mt-2">
                                <label class="text-xs text-gray-400 mr-2">正确答案:</label>
                                <select class="input-field px-3 py-1 rounded-lg text-gray-100 text-sm">
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <button type="button" id="addQuestionBtn" class="mt-3 w-full py-2 border border-dashed border-gray-600 rounded-xl text-gray-400 hover:text-primary hover:border-primary transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus"></i> 添加题目
                    </button>
                </div>

                <div class="flex items-center justify-between">
                    <button type="button" id="cancelCreateBtn" 
                        class="flex-1 py-3 bg-[#334155] text-gray-300 rounded-xl font-medium hover:bg-[#475569] transition-colors">
                        取消
                    </button>
                    <button type="submit" 
                        class="flex-1 py-3 bg-gradient-to-r from-primary to-secondary text-white rounded-xl font-medium hover:opacity-90 transition-opacity ml-3">
                        创建考试
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="examModal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="glass-card rounded-2xl p-6 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white" id="examTitle">考试</h3>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 text-gray-400">
                        <i class="fa-solid fa-clock"></i>
                        <span id="examTimer">00:00</span>
                    </div>
                    <button id="closeExamModal" class="text-gray-400 hover:text-gray-200 transition-colors">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
            </div>

            <div id="examQuestions" class="space-y-6">
            </div>

            <button id="submitExamBtn" class="mt-6 w-full py-4 bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold rounded-xl hover:opacity-90 transition-opacity">
                提交试卷
            </button>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-6 right-6 z-50 space-y-3"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-service.js"></script>
    <script src="js/leancloud-config.js"></script>
    <script src="js/leancloud-service.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>
    <script src="js/data.js"></script>
    <script src="js/data-service.js"></script>
    <script>
        let questionCount = 1;
        let examTimer = null;

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgClass = {
                success: 'toast-success',
                error: 'toast-error',
                warning: 'toast-warning',
                info: 'toast-info'
            }[type] || 'toast-info';

            const icon = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            }[type] || 'fa-info-circle';

            toast.className = `animate-slide-in-right ${bgClass} text-white px-6 py-4 rounded-xl shadow-lg flex items-center space-x-3 min-w-[280px]`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-lg"></i>
                <span class="font-medium">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function checkLogin() {
            await DataService.init();
            const user = await DataService.getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return null;
            }
            return user;
        }

        async function logout() {
            await DataService.signOut();
            window.location.href = 'index.html';
        }

        async function loadExams() {
            try {
                const exams = await DataService.getExams();
                const now = new Date();

                const activeExams = exams.filter(e => {
                    const endTime = new Date(e.endTime || e.createdAt);
                    return endTime > now;
                });
                const completedExams = exams.filter(e => {
                    const endTime = new Date(e.endTime || e.createdAt);
                    return endTime <= now;
                }).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                document.getElementById('activeCount').textContent = activeExams.length;
                document.getElementById('completedCount').textContent = completedExams.length;
                document.getElementById('totalCount').textContent = exams.length;

                renderExams([...activeExams, ...completedExams]);

            } catch (error) {
                console.error('加载考试数据失败:', error);
            }
        }

        function renderExams(exams) {
            const container = document.getElementById('examList');

            if (exams.length === 0) {
                container.innerHTML = `
                    <div class="glass-card rounded-2xl p-12 text-center">
                        <div class="w-16 h-16 bg-gray-800/50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-file-text text-gray-500 text-2xl"></i>
                        </div>
                        <p class="text-gray-400">暂无考试记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = exams.map(exam => {
                const now = new Date();
                const endTime = new Date(exam.endTime || exam.createdAt);
                const isActive = endTime > now;
                const statusClass = isActive ? 'status-active' : 'status-ended';
                const statusText = isActive ? '进行中' : '已结束';
                const questionCount = exam.questions ? exam.questions.length : 0;

                return `
                    <div class="glass-card rounded-xl p-6">
                        <div class="flex items-start justify-between">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <h4 class="text-lg font-bold text-white">${exam.name}</h4>
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                </div>
                                <p class="text-sm text-gray-400 mb-4">${exam.description || '暂无说明'}</p>
                                <div class="flex items-center gap-6 text-sm text-gray-500">
                                    <span><i class="fa-solid fa-clock mr-1"></i>${formatDateTime(exam.createdAt)}</span>
                                    <span><i class="fa-solid fa-question-circle mr-1"></i>${questionCount} 题</span>
                                    <span><i class="fa-solid fa-users mr-1"></i>${exam.participants?.length || 0} 人参加</span>
                                </div>
                            </div>
                            ${isActive ? `
                                <button class="start-exam-btn px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2"
                                    onclick="startExam('${exam.id}')">
                                    <i class="fa-solid fa-play"></i> 开始考试
                                </button>
                            ` : `
                                <button class="btn-secondary px-6 py-3 rounded-xl text-gray-300 font-medium flex items-center gap-2"
                                    onclick="viewExamResult('${exam.id}')">
                                    <i class="fa-solid fa-eye"></i> 查看结果
                                </button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatDateTime(dateString) {
            if (!dateString) return '未知';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function startExam(examId) {
            try {
                const exam = await DataService.getExamById(examId);
                if (!exam) {
                    showToast('考试不存在', 'error');
                    return;
                }

                document.getElementById('examTitle').textContent = exam.name;
                renderExamQuestions(exam.questions || []);
                document.getElementById('examModal').classList.remove('hidden');

                startTimer();

            } catch (error) {
                showToast('加载考试失败', 'error');
            }
        }

        function renderExamQuestions(questions) {
            const container = document.getElementById('examQuestions');

            if (questions.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center">暂无题目</p>';
                return;
            }

            container.innerHTML = questions.map((q, index) => `
                <div class="question-card p-5 rounded-xl">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="w-8 h-8 bg-primary/20 rounded-lg flex items-center justify-center text-primary font-bold">${index + 1}</span>
                        <h5 class="text-white font-medium">${q.content}</h5>
                    </div>
                    <div class="space-y-2">
                        ${['A', 'B', 'C', 'D'].map((opt, idx) => `
                            <label class="option-item flex items-center p-3 rounded-lg border border-gray-700/50 cursor-pointer hover:border-primary/50">
                                <input type="radio" name="question-${index}" value="${opt}" class="w-4 h-4 text-primary">
                                <span class="ml-3 text-gray-300">${opt}. ${q.options[idx]}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function startTimer() {
            let minutes = 60;
            let seconds = 0;

            if (examTimer) clearInterval(examTimer);

            examTimer = setInterval(() => {
                if (seconds === 0) {
                    minutes--;
                    seconds = 59;
                } else {
                    seconds--;
                }

                if (minutes < 0) {
                    clearInterval(examTimer);
                    submitExam();
                    return;
                }

                document.getElementById('examTimer').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        async function submitExam() {
            if (examTimer) {
                clearInterval(examTimer);
                examTimer = null;
            }

            showToast('考试已提交，正在计算成绩...', 'info');

            setTimeout(() => {
                document.getElementById('examModal').classList.add('hidden');
                showToast('成绩已保存', 'success');
                loadExams();
            }, 1500);
        }

        async function viewExamResult(examId) {
            showToast('查看考试结果功能开发中', 'info');
        }

        async function init() {
            await checkLogin();
            await loadExams();

            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('userMenuLogoutBtn').addEventListener('click', logout);

            document.getElementById('userMenuBtn').addEventListener('click', () => {
                document.getElementById('userDropdown').classList.toggle('hidden');
            });

            document.getElementById('createExamBtn').addEventListener('click', () => {
                document.getElementById('createExamModal').classList.remove('hidden');
            });

            document.getElementById('closeCreateModal').addEventListener('click', () => {
                document.getElementById('createExamModal').classList.add('hidden');
            });

            document.getElementById('cancelCreateBtn').addEventListener('click', () => {
                document.getElementById('createExamModal').classList.add('hidden');
            });

            document.getElementById('closeExamModal').addEventListener('click', () => {
                if (examTimer) {
                    clearInterval(examTimer);
                    examTimer = null;
                }
                document.getElementById('examModal').classList.add('hidden');
            });

            document.getElementById('submitExamBtn').addEventListener('click', submitExam);

            document.getElementById('addQuestionBtn').addEventListener('click', () => {
                questionCount++;
                const questionList = document.getElementById('questionList');
                
                const newQuestion = document.createElement('div');
                newQuestion.className = 'question-card p-4 rounded-xl';
                newQuestion.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm font-medium text-primary">题目 ${questionCount}</span>
                        <button type="button" class="text-gray-400 hover:text-red-400 remove-question-btn">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                    <input type="text" class="input-field w-full px-4 py-2 rounded-lg outline-none text-gray-100 text-sm mb-2"
                        placeholder="请输入题目内容" required>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                            placeholder="选项 A" required>
                        <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                            placeholder="选项 B" required>
                        <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                            placeholder="选项 C" required>
                        <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                            placeholder="选项 D" required>
                    </div>
                    <div class="mt-2">
                        <label class="text-xs text-gray-400 mr-2">正确答案:</label>
                        <select class="input-field px-3 py-1 rounded-lg text-gray-100 text-sm">
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>
                `;
                
                questionList.appendChild(newQuestion);

                newQuestion.querySelector('.remove-question-btn').addEventListener('click', () => {
                    newQuestion.remove();
                });
            });

            document.getElementById('createExamForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const name = document.getElementById('examName').value.trim();
                const startTime = document.getElementById('examStart').value;
                const endTime = document.getElementById('examEnd').value;
                const duration = document.getElementById('examDuration').value;
                const description = document.getElementById('examDescription').value.trim();

                if (!name || !startTime || !endTime) {
                    showToast('请填写必填项', 'warning');
                    return;
                }

                try {
                    const result = await DataService.createExam({
                        name,
                        startTime,
                        endTime,
                        duration: parseInt(duration) || 60,
                        description,
                        questions: [],
                        participants: []
                    });

                    if (result.success) {
                        showToast('考试创建成功', 'success');
                        document.getElementById('createExamModal').classList.add('hidden');
                        document.getElementById('createExamForm').reset();
                        questionCount = 1;
                        document.getElementById('questionList').innerHTML = `
                            <div class="question-card p-4 rounded-xl">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-sm font-medium text-primary">题目 1</span>
                                    <button type="button" class="text-gray-400 hover:text-red-400">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                                <input type="text" class="input-field w-full px-4 py-2 rounded-lg outline-none text-gray-100 text-sm mb-2"
                                    placeholder="请输入题目内容" required>
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                        placeholder="选项 A" required>
                                    <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                        placeholder="选项 B" required>
                                    <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                        placeholder="选项 C" required>
                                    <input type="text" class="input-field w-full px-3 py-2 rounded-lg outline-none text-gray-100 text-sm"
                                        placeholder="选项 D" required>
                                </div>
                                <div class="mt-2">
                                    <label class="text-xs text-gray-400 mr-2">正确答案:</label>
                                    <select class="input-field px-3 py-1 rounded-lg text-gray-100 text-sm">
                                        <option value="A">A</option>
                                        <option value="B">B</option>
                                        <option value="C">C</option>
                                        <option value="D">D</option>
                                    </select>
                                </div>
                            </div>
                        `;
                        loadExams();
                    } else {
                        showToast(result.message || '创建失败', 'error');
                    }
                } catch (error) {
                    showToast('创建失败: ' + error.message, 'error');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
