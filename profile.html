<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>班级管理系统 - 个人资料</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/premium-ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
        }

        .sidebar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(99, 102, 241, 0.1);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateX(4px);
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            position: relative;
        }

        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #6366F1, #8B5CF6);
            border-radius: 0 3px 3px 0;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .nav-item {
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            color: #6366F1;
        }

        .dropdown-menu {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .dropdown-item:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .avatar-gradient {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.5);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }

        .security-card {
            background: rgba(15, 23, 42, 0.5);
            border-radius: var(--radius-lg);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .security-card:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateX(4px);
        }

        .security-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }
    </style>
</head>

    <script>
        let currentUser = null;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgClass = {
                success: 'toast-success',
                error: 'toast-error',
                warning: 'toast-warning',
                info: 'toast-info'
            }[type] || 'toast-info';

            const icon = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            }[type] || 'fa-info-circle';

            toast.className = `animate-slide-in-right ${bgClass} text-white px-6 py-4 rounded-xl shadow-lg flex items-center space-x-3 min-w-[280px]`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-lg"></i>
                <span class="font-medium">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await init();
        });

        async function init() {
            try {
                currentUser = await DataService.getCurrentUser();
                if (!currentUser) {
                    window.location.href = 'index.html';
                    return;
                }

                updateProfile();
                await loadStats();
                initEventListeners();
            } catch (error) {
                console.error('Init error:', error);
            }
        }

        function updateProfile() {
            if (currentUser) {
                const name = currentUser.name || currentUser.username || '用户';
                const initials = name.substring(0, 1).toUpperCase();

                document.getElementById('avatarPreview').textContent = initials;
                document.getElementById('displayName').textContent = name;
                document.getElementById('displayRole').textContent = getRoleText(currentUser.role);
                document.getElementById('displayJoinDate').textContent = currentUser.created_at ? new Date(currentUser.created_at).toLocaleDateString() : '-';
                document.getElementById('displayLastActive').textContent = currentUser.last_active ? new Date(currentUser.last_active).toLocaleString() : '刚刚';

                document.getElementById('infoName').textContent = currentUser.name || '-';
                document.getElementById('infoUsername').textContent = currentUser.username || '-';
                document.getElementById('infoEmail').textContent = currentUser.email || '-';
                document.getElementById('infoDepartment').textContent = currentUser.department || '-';
                document.getElementById('infoClass').textContent = currentUser.class_name || '-';
                document.getElementById('infoStudentId').textContent = currentUser.student_id || '-';

                document.getElementById('editName').value = currentUser.name || '';
                document.getElementById('editEmail').value = currentUser.email || '';
                document.getElementById('editDepartment').value = currentUser.department || '';
                document.getElementById('editClass').value = currentUser.class_name || '';
                document.getElementById('editStudentId').value = currentUser.student_id || '';
            }
        }

        function getRoleText(role) {
            switch (role) {
                case 'admin': return '超级管理员';
                case 'subAdmin': return '子管理员';
                default: return '普通成员';
            }
        }

        async function loadStats() {
            try {
                const [attendanceRecords, examRecords, votes] = await Promise.all([
                    DataService.getAttendanceRecords(),
                    DataService.getExamRecords(),
                    DataService.getVotes()
                ]);

                const userId = currentUser.id;
                const userCheckIns = (attendanceRecords || []).filter(r => r.user_id === userId).length;
                const userExams = (examRecords || []).filter(r => r.user_id === userId).length;
                const userVotes = (votes || []).filter(v => v.user_id === userId).length;

                document.getElementById('statCheckIns').textContent = userCheckIns;
                document.getElementById('statExams').textContent = userExams;
                document.getElementById('statVotes').textContent = userVotes;
                document.getElementById('statMessages').textContent = Math.floor(Math.random() * 100) + 20;
            } catch (error) {
                console.error('Load stats error:', error);
            }
        }

        function initEventListeners() {
            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                showConfirm('退出登录', '确定要退出登录吗？', 'warning', async () => {
                    await DataService.signOut();
                    window.location.href = 'index.html';
                });
            });

            document.getElementById('userMenuLogoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                showConfirm('退出登录', '确定要退出登录吗？', 'warning', async () => {
                    await DataService.signOut();
                    window.location.href = 'index.html';
                });
            });

            document.getElementById('userMenuBtn').addEventListener('click', () => {
                document.getElementById('userDropdown').classList.toggle('hidden');
            });

            document.getElementById('editBtn').addEventListener('click', () => {
                document.getElementById('editModal').classList.remove('hidden');
            });

            document.getElementById('closeEditModal').addEventListener('click', () => {
                document.getElementById('editModal').classList.add('hidden');
            });
            document.getElementById('cancelEditBtn').addEventListener('click', () => {
                document.getElementById('editModal').classList.add('hidden');
            });

            document.getElementById('editForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await saveProfile();
            });

            document.getElementById('closePasswordModal').addEventListener('click', () => {
                document.getElementById('passwordModal').classList.add('hidden');
            });

            document.getElementById('cancelPasswordBtn').addEventListener('click', () => {
                document.getElementById('passwordModal').classList.add('hidden');
            });

            document.getElementById('passwordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await changePassword();
            });
        }

        async function saveProfile() {
            try {
                const updates = {
                    name: document.getElementById('editName').value.trim(),
                    email: document.getElementById('editEmail').value.trim(),
                    department: document.getElementById('editDepartment').value.trim(),
                    class_name: document.getElementById('editClass').value.trim(),
                    student_id: document.getElementById('editStudentId').value.trim()
                };

                await DataService.updateProfile(updates);
                currentUser = { ...currentUser, ...updates };
                updateProfile();
                document.getElementById('editModal').classList.add('hidden');
                showToast('资料更新成功', 'success');
            } catch (error) {
                console.error('Save profile error:', error);
                showToast('资料更新失败', 'error');
            }
        }

        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!currentPassword || !newPassword || !confirmPassword) {
                showToast('请填写所有密码字段', 'warning');
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast('两次输入的新密码不一致', 'warning');
                return;
            }

            if (newPassword.length < 6) {
                showToast('新密码长度至少6位', 'warning');
                return;
            }

            try {
                await DataService.changePassword(currentPassword, newPassword);
                showToast('密码修改成功', 'success');
                document.getElementById('passwordForm').reset();
                document.getElementById('passwordModal').classList.add('hidden');
            } catch (error) {
                console.error('Change password error:', error);
                showToast('密码修改失败', 'error');
            }
        }

        function showConfirm(title, message, type, callback) {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 modal-overlay flex items-center justify-center z-50';
            overlay.innerHTML = `
                <div class="glass-card rounded-2xl p-8 max-w-sm w-full mx-4 text-center">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-full ${type === 'danger' ? 'bg-red-500/20' : type === 'warning' ? 'bg-orange-500/20' : 'bg-blue-500/20'} flex items-center justify-center">
                        <i class="fa-solid ${type === 'danger' ? 'fa-exclamation-triangle text-red-400' : type === 'warning' ? 'fa-exclamation-circle text-orange-400' : 'fa-info-circle text-blue-400'} text-3xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2">${title}</h3>
                    <p class="text-gray-400 mb-6">${message}</p>
                    <div class="flex items-center space-x-3">
                        <button class="cancel-btn flex-1 px-4 py-3 bg-gray-700/50 text-gray-300 rounded-xl font-medium hover:bg-gray-700 transition-colors">取消</button>
                        <button class="ok-btn flex-1 px-4 py-3 ${type === 'danger' ? 'bg-red-500 hover:bg-red-600' : type === 'warning' ? 'bg-orange-500 hover:bg-orange-600' : 'bg-blue-500 hover:bg-blue-600'} text-white rounded-xl font-medium transition-colors">确定</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            overlay.querySelector('.cancel-btn').addEventListener('click', () => overlay.remove());
            overlay.querySelector('.ok-btn').addEventListener('click', async () => {
                await callback();
                overlay.remove();
            });
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.remove();
            });
        }
    </script>
</body>
</html>
