<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>班级管理系统 - 签到管理</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F172A">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/premium-ui.css">
    <style>
        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
        }

        .sidebar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(99, 102, 241, 0.1);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateX(4px);
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            position: relative;
        }

        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #6366F1, #8B5CF6);
            border-radius: 0 3px 3px 0;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: rgba(71, 85, 105, 0.5);
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(71, 85, 105, 0.7);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: medium;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }

        .status-ended {
            background: rgba(107, 114, 128, 0.2);
            color: #9CA3AF;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
        }

        .nav-item {
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            color: #6366F1;
        }

        .dropdown-menu {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .dropdown-item:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .checkin-btn {
            background: linear-gradient(135deg, #10B981, #059669);
            transition: all 0.3s ease;
        }

        .checkin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .checkin-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar fixed lg:sticky top-0 left-0 h-full w-64 flex flex-col z-40">
            <div class="p-6 border-b border-gray-700/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center shadow-lg">
                        <i class="fa-solid fa-graduation-cap text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white">班级管理系统</h1>
                        <p class="text-xs text-gray-400 hidden sm:block">大学生综合管理平台</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 p-4 space-y-1">
                <a href="dashboard.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-chart-pie text-lg"></i>
                    <span class="font-medium">数据概览</span>
                </a>
                <a href="attendance-new.html" class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-map-marker text-lg"></i>
                    <span class="font-medium">签到管理</span>
                </a>
                <a href="exam.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-file-text text-lg"></i>
                    <span class="font-medium">考试系统</span>
                </a>
                <a href="vote.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-check-square-o text-lg"></i>
                    <span class="font-medium">投票抽奖</span>
                </a>
                <a href="chat.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-comments text-lg"></i>
                    <span class="font-medium">实时聊天</span>
                </a>
                <a href="users.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-users text-lg"></i>
                    <span class="font-medium">成员管理</span>
                </a>
                <a href="settings.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300">
                    <i class="fa-solid fa-cog text-lg"></i>
                    <span class="font-medium">系统设置</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-700/50">
                <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-colors">
                    <i class="fa-solid fa-right-from-bracket text-lg"></i>
                    <span class="font-medium">退出登录</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-[#0F172A]/80 backdrop-blur-md border-b border-gray-700/50 sticky top-0 z-30">
                <div class="px-6 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-white">签到管理</h2>
                        <p class="text-sm text-gray-400">管理班级签到活动</p>
                    </div>

                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <button id="notificationBtn" class="nav-item p-2 rounded-lg text-gray-400 hover:text-white relative">
                                <i class="fa-solid fa-bell text-xl"></i>
                            </button>
                        </div>

                        <div class="relative">
                            <button id="userMenuBtn" class="nav-item flex items-center gap-3 px-3 py-2 rounded-xl text-gray-400 hover:text-white">
                                <div class="w-8 h-8 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-white font-medium">
                                    <i class="fa-solid fa-user"></i>
                                </div>
                                <span class="hidden sm:block font-medium">管理员</span>
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </button>
                            <div id="userDropdown" class="dropdown-menu hidden absolute right-0 top-full mt-2 w-48 rounded-xl p-2 shadow-xl">
                                <a href="profile.html" class="dropdown-item flex items-center gap-2 px-3 py-2 rounded-lg text-gray-300 hover:text-white">
                                    <i class="fa-solid fa-user"></i> 个人资料
                                </a>
                                <a href="settings.html" class="dropdown-item flex items-center gap-2 px-3 py-2 rounded-lg text-gray-300 hover:text-white">
                                    <i class="fa-solid fa-cog"></i> 设置
                                </a>
                                <div class="border-t border-gray-700/50 my-1"></div>
                                <button id="userMenuLogoutBtn" class="dropdown-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-red-400 hover:text-red-300">
                                    <i class="fa-solid fa-right-from-bracket"></i> 退出登录
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="p-6">
                <div class="flex flex-col sm:flex-row gap-4 mb-6">
                    <button id="createAttendanceBtn" class="btn-primary px-6 py-3 rounded-xl text-white font-medium flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus"></i> 创建签到活动
                    </button>
                    <div class="flex-1 relative">
                        <input type="text" id="searchInput" 
                            class="input-field w-full px-5 py-3 rounded-xl outline-none text-gray-100 pr-10"
                            placeholder="搜索签到活动...">
                        <i class="fa-solid fa-search absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>

                    </h3>
                    <div id="activeAttendanceList" class="grid grid-cols-1 lg:grid-cols-3 gap-6">

                </div>

                <div id="historyAttendanceSection">

                        <i class="fa-solid fa-history text-gray-400"></i> 历史签到记录

    <div id="createAttendanceModal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">

            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">
                    <i class="fa-solid fa-plus-circle text-primary mr-2"></i>创建签到活动
                </h3>
                <button id="closeCreateModal" class="text-gray-400 hover:text-gray-200 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <form id="createAttendanceForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">签到名称</label>
                    <input type="text" id="attendanceName" 
                        class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100"
                        placeholder="例如: 周一班会签到" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">签到地点</label>
                    <input type="text" id="attendanceLocation" 
                        class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100"
                        placeholder="例如: 教学楼A座301">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">开始时间</label>
                        <input type="datetime-local" id="attendanceStart" 
                            class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">结束时间</label>
                        <input type="datetime-local" id="attendanceEnd" 
                            class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">签到说明</label>
                    <textarea id="attendanceDescription" rows="3"
                        class="input-field w-full px-4 py-3 rounded-xl outline-none text-gray-100 resize-none"
                        placeholder="添加签到活动的详细说明..."></textarea>
                </div>

                <div class="flex items-center justify-between">
                    <button type="button" id="cancelCreateBtn" 
                        class="flex-1 py-3 bg-[#334155] text-gray-300 rounded-xl font-medium hover:bg-[#475569] transition-colors">
                        取消
                    </button>
                    <button type="submit" 
                        class="flex-1 py-3 bg-gradient-to-r from-primary to-secondary text-white rounded-xl font-medium hover:opacity-90 transition-opacity ml-3">
                        创建活动
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="checkinModal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="glass-card rounded-2xl p-8 max-w-sm w-full mx-4 text-center">
            <div class="w-20 h-20 bg-gradient-to-br from-green-500 to-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                <i class="fa-solid fa-location-dot text-white text-3xl"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">确认签到</h3>
            <p class="text-gray-400 mb-6">点击下方按钮完成签到，系统将记录您的位置信息</p>
            <button id="confirmCheckinBtn" class="checkin-btn w-full py-4 rounded-xl text-white font-semibold text-lg flex items-center justify-center gap-2">
                <i class="fa-solid fa-check-circle"></i> 确认签到
            </button>
            <button id="cancelCheckinBtn" class="mt-4 text-gray-400 hover:text-gray-200 text-sm">取消</button>
        </div>
    </div>

    <div id="attendanceDetailModal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="glass-card rounded-2xl p-6 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">签到详情</h3>
                <button id="closeDetailModal" class="text-gray-400 hover:text-gray-200 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div id="attendanceDetailContent">
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-6 right-6 z-50 space-y-3"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-service.js"></script>
    <script src="js/leancloud-config.js"></script>
    <script src="js/leancloud-service.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>
    <script src="js/data.js?v=5"></script>
    <script src="js/data-service.js"></script>
    <script>
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgClass = {
                success: 'toast-success',
                error: 'toast-error',
                warning: 'toast-warning',
                info: 'toast-info'
            }[type] || 'toast-info';

            const icon = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            }[type] || 'fa-info-circle';

            toast.className = `animate-slide-in-right ${bgClass} text-white px-6 py-4 rounded-xl shadow-lg flex items-center space-x-3 min-w-[280px]`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-lg"></i>
                <span class="font-medium">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function checkLogin() {
            await DataService.init();
            const user = await DataService.getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return null;
            }
            return user;
        }

        async function logout() {
            await DataService.signOut();
            window.location.href = 'index.html';
        }

        async function loadAttendances() {
            try {
                const attendances = await DataService.getAttendances();
                const users = await DataService.getUsers();
                
                const now = new Date();
                const activeAttendances = attendances.filter(a => {
                    const endTime = new Date(a.endTime || a.createdAt);
                    return endTime > now;
                });
                const historyAttendances = attendances.filter(a => {
                    const endTime = new Date(a.endTime || a.createdAt);
                    return endTime <= now;
                }).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                renderActiveAttendances(activeAttendances, users);
                renderHistoryAttendances(historyAttendances, users);

            } catch (error) {
                console.error('加载签到数据失败:', error);
            }
        }

        function renderActiveAttendances(attendances, users) {
            const container = document.getElementById('activeAttendanceList');
            
            if (attendances.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="w-16 h-16 bg-gray-800/50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-clock text-gray-500 text-2xl"></i>
                        </div>
                        <p class="text-gray-400">暂无进行中的签到活动</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = attendances.map(attendance => {
                const checkedUsers = attendance.checkedUsers || [];
                const rate = users.length > 0 ? Math.round((checkedUsers.length / users.length) * 100) : 0;

                return `
                    <div class="glass-card rounded-2xl p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <h4 class="text-lg font-bold text-white">${attendance.name}</h4>
                                <p class="text-sm text-gray-400 mt-1">${attendance.location || '未设置地点'}</p>
                            </div>
                            <span class="status-badge status-active">进行中</span>
                        </div>

                        <div class="mb-4">
                            <div class="flex items-center justify-between text-sm mb-2">
                                <span class="text-gray-400">签到进度</span>
                                <span class="text-white font-medium">${checkedUsers.length}/${users.length} (${rate}%)</span>
                            </div>
                            <div class="h-2 bg-gray-700/50 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-green-500 to-emerald-500 transition-all duration-500" style="width: ${rate}%"></div>
                            </div>
                        </div>

                        <div class="flex items-center justify-between text-sm text-gray-500 mb-6">
                            <span><i class="fa-solid fa-clock mr-1"></i>${formatDateTime(attendance.startTime)}</span>
                            <span><i class="fa-solid fa-clock mr-1"></i>${formatDateTime(attendance.endTime)}</span>
                        </div>

                        <button class="checkin-btn w-full py-3 rounded-xl text-white font-medium flex items-center justify-center gap-2"
                            onclick="openCheckinModal('${attendance.id}', '${attendance.name}')">
                            <i class="fa-solid fa-location-arrow"></i> 立即签到
                        </button>
                    </div>
                `;
            }).join('');
        }

        function renderHistoryAttendances(attendances, users) {
            const container = document.getElementById('historyAttendanceList');
            
            if (attendances.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="w-16 h-16 bg-gray-800/50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-history text-gray-500 text-2xl"></i>
                        </div>
                        <p class="text-gray-400">暂无历史签到记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = attendances.map(attendance => {
                const checkedUsers = attendance.checkedUsers || [];
                const rate = users.length > 0 ? Math.round((checkedUsers.length / users.length) * 100) : 0;

                return `
                    <div class="glass-card rounded-xl p-4 flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-3">
                                <h4 class="font-medium text-white">${attendance.name}</h4>
                                <span class="status-badge status-ended">已结束</span>
                            </div>
                            <div class="flex items-center gap-4 mt-2 text-sm text-gray-400">
                                <span><i class="fa-solid fa-map-marker mr-1"></i>${attendance.location || '未设置地点'}</span>
                                <span><i class="fa-solid fa-clock mr-1"></i>${formatDateTime(attendance.createdAt)}</span>
                                <span><i class="fa-solid fa-users mr-1"></i>${checkedUsers.length}/${users.length} (${rate}%)</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="btn-secondary px-4 py-2 rounded-lg text-gray-300 hover:text-white transition-colors"
                                onclick="openAttendanceDetail('${attendance.id}')">
                                <i class="fa-solid fa-eye"></i> 查看详情
                            </button>
                            <button class="btn-danger px-4 py-2 rounded-lg text-red-300 hover:text-red-200 transition-colors"
                                onclick="deleteAttendance('${attendance.id}', '${attendance.name}')">
                                <i class="fa-solid fa-trash"></i> 删除
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatDateTime(dateString) {
            if (!dateString) return '未知';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function deleteAttendance(id, name) {
            if (!confirm(`确定要删除签到活动「${name}」吗？此操作不可恢复！`)) {
                return;
            }
            
            try {
                await DataService.deleteAttendance(id);
                showToast('签到活动删除成功', 'success');
                await loadAttendances();
            } catch (error) {
                console.error('删除签到活动失败:', error);
                showToast('删除签到活动失败: ' + (error.message || '未知错误'), 'error');
            }
        }

        let currentCheckinId = null;

        function openCheckinModal(id, name) {
            currentCheckinId = id;
            document.getElementById('checkinModal').classList.remove('hidden');
        }

        async function confirmCheckin() {
            if (!currentCheckinId) return;

            const user = await DataService.getCurrentUser();
            if (!user) {
                showToast('请先登录', 'error');
                return;
            }

            try {
                const result = await DataService.checkIn(currentCheckinId, user.id);
                
                if (result.success) {
                    showToast('签到成功！', 'success');
                    document.getElementById('checkinModal').classList.add('hidden');
                    loadAttendances();
                } else {
                    showToast(result.message || '签到失败', 'error');
                }
            } catch (error) {
                showToast('签到失败: ' + error.message, 'error');
            }
        }

        async function openAttendanceDetail(id) {
            try {
                const attendance = await DataService.getAttendanceById(id);
                const users = await DataService.getUsers();

                if (!attendance) {
                    showToast('签到活动不存在', 'error');
                    return;
                }

                const checkedUsers = attendance.checkedUsers || [];
                const rate = users.length > 0 ? Math.round((checkedUsers.length / users.length) * 100) : 0;

                document.getElementById('attendanceDetailContent').innerHTML = `
                    <div class="space-y-4">
                        <div class="p-4 bg-gray-800/30 rounded-xl">
                            <h4 class="text-lg font-bold text-white mb-2">${attendance.name}</h4>
                            <p class="text-sm text-gray-400">${attendance.description || '暂无说明'}</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-4 bg-gray-800/30 rounded-xl">
                                <p class="text-xs text-gray-500 mb-1">签到地点</p>
                                <p class="text-white font-medium">${attendance.location || '未设置'}</p>
                            </div>
                            <div class="p-4 bg-gray-800/30 rounded-xl">
                                <p class="text-xs text-gray-500 mb-1">签到率</p>
                                <p class="text-white font-medium">${rate}%</p>
                            </div>
                            <div class="p-4 bg-gray-800/30 rounded-xl">
                                <p class="text-xs text-gray-500 mb-1">开始时间</p>
                                <p class="text-white font-medium">${formatDateTime(attendance.startTime)}</p>
                            </div>
                            <div class="p-4 bg-gray-800/30 rounded-xl">
                                <p class="text-xs text-gray-500 mb-1">结束时间</p>
                                <p class="text-white font-medium">${formatDateTime(attendance.endTime)}</p>
                            </div>
                        </div>

                        <div>
                            <h5 class="text-sm font-medium text-gray-300 mb-3">签到人员 (${checkedUsers.length}人)</h5>
                            <div class="flex flex-wrap gap-2">
                                ${checkedUsers.map(userId => {
                                    const user = users.find(u => u.id === userId);
                                    return `
                                        <span class="px-3 py-1 bg-green-500/20 text-green-400 rounded-full text-sm">
                                            ${user ? user.name : userId}
                                        </span>
                                    `;
                                }).join('')}
                                ${checkedUsers.length === 0 ? '<p class="text-gray-500 text-sm">暂无签到人员</p>' : ''}
                            </div>
                        </div>

                        <div>
                            <h5 class="text-sm font-medium text-gray-300 mb-3">未签到人员 (${users.length - checkedUsers.length}人)</h5>
                            <div class="flex flex-wrap gap-2">
                                ${users.filter(u => !checkedUsers.includes(u.id)).map(user => `
                                    <span class="px-3 py-1 bg-red-500/20 text-red-400 rounded-full text-sm">
                                        ${user.name}
                                    </span>
                                `).join('')}
                                ${users.length === checkedUsers.length ? '<p class="text-gray-500 text-sm">全部已签到</p>' : ''}
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('attendanceDetailModal').classList.remove('hidden');
            } catch (error) {
                showToast('加载详情失败', 'error');
            }
        }

        async function init() {
            await checkLogin();
            await loadAttendances();

            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('userMenuLogoutBtn').addEventListener('click', logout);

            document.getElementById('userMenuBtn').addEventListener('click', () => {
                document.getElementById('userDropdown').classList.toggle('hidden');
            });

            document.getElementById('createAttendanceBtn').addEventListener('click', () => {
                document.getElementById('createAttendanceModal').classList.remove('hidden');
            });

            document.getElementById('closeCreateModal').addEventListener('click', () => {
                document.getElementById('createAttendanceModal').classList.add('hidden');
            });

            document.getElementById('cancelCreateBtn').addEventListener('click', () => {
                document.getElementById('createAttendanceModal').classList.add('hidden');
            });

            document.getElementById('cancelCheckinBtn').addEventListener('click', () => {
                document.getElementById('checkinModal').classList.add('hidden');
            });

            document.getElementById('confirmCheckinBtn').addEventListener('click', confirmCheckin);

            document.getElementById('closeDetailModal').addEventListener('click', () => {
                document.getElementById('attendanceDetailModal').classList.add('hidden');
            });

            document.getElementById('createAttendanceForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const name = document.getElementById('attendanceName').value.trim();
                const location = document.getElementById('attendanceLocation').value.trim();
                const startTime = document.getElementById('attendanceStart').value;
                const endTime = document.getElementById('attendanceEnd').value;
                const description = document.getElementById('attendanceDescription').value.trim();

                if (!name || !startTime || !endTime) {
                    showToast('请填写必填项', 'warning');
                    return;
                }

                if (new Date(endTime) <= new Date(startTime)) {
                    showToast('结束时间必须晚于开始时间', 'warning');
                    return;
                }

                try {
                    const result = await DataService.createAttendance({
                        name,
                        location,
                        startTime,
                        endTime,
                        description,
                        checkedUsers: []
                    });

                    if (result.success) {
                        showToast('签到活动创建成功', 'success');
                        document.getElementById('createAttendanceModal').classList.add('hidden');
                        document.getElementById('createAttendanceForm').reset();
                        loadAttendances();
                    } else {
                        showToast(result.message || '创建失败', 'error');
                    }
                } catch (error) {
                    showToast('创建失败: ' + error.message, 'error');
                }
            });

            document.getElementById('searchInput').addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase();
                const historyItems = document.querySelectorAll('#historyAttendanceList > div');
                
                historyItems.forEach(item => {
                    const text = item.textContent.toLowerCase();
                    item.style.display = text.includes(keyword) ? 'flex' : 'none';
                });
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
