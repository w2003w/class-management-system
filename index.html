<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>班级管理系统 - 登录</title>
    <script src="js/route-fix.js"></script>
    <link rel="stylesheet" href="css/premium-ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 50%, #0F172A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 70%);
            animation: rotate 60s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.6);
            border-radius: 50%;
            animation: float-particle 10s ease-in-out infinite;
        }

        @keyframes float-particle {
            0%, 100% { 
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        .login-card {
            position: relative;
            overflow: hidden;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            animation: scale-in 0.4s ease-out;
        }

        @keyframes scale-in {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(99, 102, 241, 0.1) 0%, transparent 60%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .logo-container {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse-glow 3s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
            50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.5); }
        }

        .logo-container i {
            font-size: 32px;
            color: white;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .login-header p {
            font-size: 14px;
            color: #94A3B8;
            margin: 8px 0 0;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 16px;
            transition: color 0.2s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 12px;
            font-size: 15px;
            color: #F8FAFC;
            transition: all 0.25s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .input-group input:focus + i {
            color: #6366F1;
        }

        .input-group input::placeholder {
            color: #94A3B8;
        }

        .eye-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            cursor: pointer;
            font-size: 16px;
            z-index: 2;
            transition: color 0.2s;
        }

        .eye-icon:hover {
            color: #6366F1;
        }

        .remember-forgot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-checkbox input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .checkbox-custom {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(71, 85, 105, 0.5);
            border-radius: 6px;
            position: relative;
            transition: all 0.2s;
        }

        .remember-checkbox input:checked + .checkbox-custom {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            border-color: #6366F1;
        }

        .remember-checkbox input:checked + .checkbox-custom::after {
            content: '';
            position: absolute;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .remember-checkbox span {
            font-size: 14px;
            color: #94A3B8;
        }

        .forgot-password {
            font-size: 14px;
            color: #6366F1;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #818CF8;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 32px 0;
            position: relative;
            z-index: 1;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(71, 85, 105, 0.5);
        }

        .divider-text {
            color: #94A3B8;
            font-size: 12px;
            font-weight: 500;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.25s;
            border: none;
            cursor: pointer;
        }

        .social-btn:hover {
            transform: translateY(-2px);
        }

        .social-btn.google {
            background: rgba(239, 68, 68, 0.1);
            color: #EF4444;
        }

        .social-btn.google:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .social-btn.wechat {
            background: rgba(34, 197, 94, 0.1);
            color: #22C55E;
        }

        .social-btn.wechat:hover {
            background: rgba(34, 197, 94, 0.2);
        }

        .register-link {
            text-align: center;
            font-size: 14px;
            color: #94A3B8;
            position: relative;
            z-index: 1;
        }

        .register-link a {
            color: #6366F1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .register-link a:hover {
            color: #818CF8;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 20px;
        }

        .modal-overlay.flex {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
            animation: scale-in 0.3s ease-out;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #F8FAFC;
            margin: 0;
        }

        .modal-close {
            color: #94A3B8;
            cursor: pointer;
            font-size: 20px;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #F8FAFC;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #94A3B8;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 10px;
            font-size: 14px;
            color: #F8FAFC;
            outline: none;
            transition: all 0.25s;
        }

        .form-group input:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .form-group input::placeholder {
            color: #94A3B8;
        }

        .captcha-row {
            display: flex;
            gap: 12px;
        }

        .captcha-row input {
            flex: 1;
        }

        .btn-secondary {
            padding: 12px 24px;
            background: transparent;
            color: #F8FAFC;
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 10px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
        }

        .btn-secondary:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: #6366F1;
            color: #6366F1;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .modeling-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transition: all 0.3s;
            z-index: 100;
        }

        .modeling-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
            background: linear-gradient(135deg, #059669, #047857);
        }

        .modeling-btn i {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="floating-particles" id="particles"></div>
    
    <a href="modeling.html" class="modeling-btn" target="_blank">
        <i class="fa-solid fa-brain"></i>
        <span>数学建模</span>
    </a>
    
    <div class="login-card">
        <div class="login-header">
            <div class="logo-container">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h1>班级管理系统</h1>
            <p>大学生班级综合管理平台</p>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="用户名" required>
                <i class="fa-solid fa-user"></i>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="密码" required>
                <i class="fa-solid fa-lock"></i>
                <i class="fa-solid fa-eye eye-icon"></i>
            </div>
            
            <div class="remember-forgot">
                <label class="remember-checkbox">
                    <input type="checkbox">
                    <span class="checkbox-custom"></span>
                    <span>记住我</span>
                </label>
                <a href="#" class="forgot-password" onclick="showForgotPassword()">忘记密码?</a>
            </div>
            
            <button type="submit" class="login-btn">登 录</button>
        </form>
        
        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">其他登录方式</div>
            <div class="divider-line"></div>
        </div>
        
        <div class="social-buttons">
            <button class="social-btn google">
                <i class="fa-brands fa-google"></i>
                <span>Google</span>
            </button>
            <button class="social-btn wechat">
                <i class="fa-brands fa-weixin"></i>
                <span>微信</span>
            </button>
        </div>
        
        <p class="register-link">
            还没有账号? <a href="#">立即注册</a>
        </p>
    </div>

    <div id="forgotPasswordModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>找回密码</h2>
                <button class="modal-close" onclick="hideForgotPassword()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>注册邮箱</label>
                    <input type="email" placeholder="请输入注册邮箱" required>
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <div class="captcha-row">
                        <input type="text" placeholder="请输入验证码" required>
                        <button type="button" class="btn-secondary">获取验证码</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" placeholder="请输入新密码" required>
                </div>
                <button type="submit" class="btn-primary">提交</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        window.createClient = createClient;
    </script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/version-check-service.js?v=8"></script>
    <script src="js/supabase-config.js?v=8"></script>
    <script src="js/supabase-service.js?v=8"></script>
    <script src="js/leancloud-config.js?v=8"></script>
    <script src="js/leancloud-service.js?v=8"></script>
    <script src="js/firebase-config.js?v=8"></script>
    <script src="js/firebase-service.js?v=8"></script>
    <script src="js/data.js?v=8"></script>
    <script src="js/data-service.js?v=8"></script>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (8 + Math.random() * 4) + 's';
                container.appendChild(particle);
            }
        }
        
        createParticles();
        
        document.addEventListener('DOMContentLoaded', function() {
            const eyeIcon = document.querySelector('.eye-icon');
            if (eyeIcon) {
                eyeIcon.addEventListener('click', function() {
                    const passwordInput = document.getElementById('password');
                    if (passwordInput) {
                        if (passwordInput.type === 'password') {
                            passwordInput.type = 'text';
                            eyeIcon.className = 'fa-solid fa-eye-slash eye-icon';
                        } else {
                            passwordInput.type = 'password';
                            eyeIcon.className = 'fa-solid fa-eye eye-icon';
                        }
                    }
                });
            }
        });
        
        function showForgotPassword() {
            document.getElementById('forgotPasswordModal').classList.add('flex');
        }
        
        function hideForgotPassword() {
            document.getElementById('forgotPasswordModal').classList.remove('flex');
        }

        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            toast.className = `fixed top-6 right-6 ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white px-6 py-3 rounded-xl shadow-lg z-50 animate-slide-in-right`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-times-circle'} mr-2"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showToast('请输入用户名和密码');
                return;
            }
            
            try {
                await DataService.init();
                const result = await DataService.signIn(username, password);
                
                if (result.success) {
                    window.location.href = 'dashboard.html';
                } else {
                    showToast(result.message || '登录失败');
                }
            } catch (error) {
                console.error('Login error:', error);
                showToast('登录异常: ' + error.message);
            }
        });
        
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            hideForgotPassword();
        });
    </script>
</body>
</html>
